<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crypto Radar Pro Static</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, #172033 0, #07080c 42%, #050505 100%); color: #f5f7fb; }
    header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(18px); background: rgba(5, 5, 8, .86); border-bottom: 1px solid rgba(255,255,255,.08); padding: 18px 16px; }
    .header-inner { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0; font-size: 26px; letter-spacing: -.04em; }
    .sub { color: #aab1c3; font-size: 13px; margin-top: 6px; line-height: 1.5; }
    main { max-width: 1180px; margin: 0 auto; padding: 16px; }
    .bar { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
    button { border: 0; border-radius: 14px; padding: 13px 14px; font-weight: 800; font-size: 15px; cursor: pointer; background: #f5f7fb; color: #06070a; }
    button.danger { background: #401313; color: #ffb7b7; border: 1px solid rgba(255,80,80,.35); }
    .status { padding: 12px 14px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); border-radius: 16px; color: #c6ccda; font-size: 13px; line-height: 1.5; }
    .metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .metric { background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.09); border-radius: 18px; padding: 14px; }
    .metric .label { color: #aab1c3; font-size: 12px; }
    .metric .value { font-size: 22px; font-weight: 900; margin-top: 5px; letter-spacing: -.03em; }
    .section-title { margin: 22px 0 10px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 14px; box-shadow: 0 18px 60px rgba(0,0,0,.22); }
    .coin-top { display: flex; align-items: center; gap: 10px; }
    .coin-top img { width: 36px; height: 36px; border-radius: 999px; }
    .coin-name { font-weight: 900; }
    .coin-symbol { color: #aab1c3; font-size: 12px; margin-top: 2px; }
    .score { font-size: 32px; font-weight: 950; margin: 12px 0 8px; letter-spacing: -.05em; }
    .pill { display: inline-flex; border-radius: 999px; padding: 6px 9px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,.08); color: #d7dbea; }
    .buy { background: rgba(68,255,151,.14); color: #8dffbd; border: 1px solid rgba(68,255,151,.25); }
    .watch { background: rgba(255,214,90,.14); color: #ffe089; border: 1px solid rgba(255,214,90,.25); }
    .danger-pill { background: rgba(255,82,82,.14); color: #ffaaaa; border: 1px solid rgba(255,82,82,.28); }
    .rows { margin-top: 12px; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,.08); font-size: 13px; }
    .row span:first-child { color: #aab1c3; }
    .plus { color: #7dff9f; }
    .minus { color: #ff8585; }
    .table { overflow: auto; border: 1px solid rgba(255,255,255,.1); border-radius: 18px; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; background: rgba(255,255,255,.045); }
    th, td { padding: 11px 10px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: left; font-size: 13px; }
    th { color: #aab1c3; font-weight: 800; }
    a { color: #9ecbff; }
    .notice { margin-top: 18px; color: #aab1c3; font-size: 12px; line-height: 1.6; }
    @media (min-width: 780px) { .bar { grid-template-columns: 1fr 180px 180px; align-items: center; } .metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); } .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  </style>
</head>
<body>
<header><div class="header-inner"><h1>Crypto Radar Pro</h1><div class="sub">無料静的版：CoinGecko直取得 + ブラウザ内ペーパートレード。サーバー不要 / 秘密鍵なし / 実売買なし。</div></div></header>
<main>
  <div class="bar"><div class="status" id="status">起動中です。更新を押してください。</div><button onclick="loadData()">更新</button><button class="danger" onclick="resetTrading()">リセット</button></div>
  <div class="metrics" id="metrics"></div>
  <h2 class="section-title">保有中ポジション</h2><div class="table"><table id="positions"></table></div>
  <h2 class="section-title">買い監視候補</h2><div class="grid" id="cards"></div>
  <h2 class="section-title">取引ログ</h2><div class="table"><table id="trades"></table></div>
  <h2 class="section-title">公式ニュースリンク</h2><div class="card"><p><a href="https://www.binance.com/en/support/announcement" target="_blank">Binance Announcements</a></p><p><a href="https://www.coinbase.com/blog" target="_blank">Coinbase Blog</a></p><p><a href="https://www.okx.com/help/section/announcements" target="_blank">OKX Announcements</a></p><p><a href="https://www.coingecko.com/en/discover" target="_blank">CoinGecko Trending</a></p></div>
  <div class="notice">注意: これはペーパートレード用MVPです。投資助言ではありません。実際の売買は行いません。</div>
</main>
<script>
const CONFIG = { maxPositions:3, positionSizePct:.15, takeProfitPct:4, stopLossPct:-2, maxHoldHours:6, minScoreToBuy:70, minVolumeUsd:50000000, minMarketCapUsd:100000000 };
const defaultState = { paperTradingEnabled:true, startingCash:10000, cash:10000, positions:[], trades:[], closedPnL:0 };
let state = JSON.parse(localStorage.getItem('cryptoRadarState') || 'null') || defaultState;
function save(){ localStorage.setItem('cryptoRadarState', JSON.stringify(state)); }
function safeNumber(v,f=0){ const n=Number(v); return Number.isFinite(n)?n:f; }
function fmtUsd(n){ return '$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?6:2}); }
function fmtPct(n){ return Number(n||0).toFixed(2)+'%'; }
function fmtBig(n){ n=Number(n||0); if(n>=1e9)return '$'+(n/1e9).toFixed(2)+'B'; if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M'; return '$'+n.toLocaleString('en-US'); }
function cls(n){ return Number(n)>=0?'plus':'minus'; }
function penalty(c){ const ch=safeNumber(c.price_change_percentage_24h), vol=safeNumber(c.total_volume), mc=safeNumber(c.market_cap); let p=0; if(mc<5e7&&Math.abs(ch)>20)p+=30; if(vol>mc*.9)p+=18; if(ch>25)p+=18; if(ch<-15)p+=12; return p; }
function danger(c){ const ch=safeNumber(c.price_change_percentage_24h), vol=safeNumber(c.total_volume), mc=safeNumber(c.market_cap); if(mc<5e7&&Math.abs(ch)>20)return '危険: 小型急騰'; if(vol>mc*.9)return '注意: 出来高過熱'; if(ch>25)return '注意: 急騰しすぎ'; if(ch<-15)return '注意: 急落中'; return '通常監視'; }
function score(c){ const ch=safeNumber(c.price_change_percentage_24h), vol=safeNumber(c.total_volume), mc=safeNumber(c.market_cap), rank=safeNumber(c.market_cap_rank,9999); let s=0; if(ch>=3&&ch<=12)s+=35; else if(ch>12&&ch<=25)s+=18; else if(ch>=1&&ch<3)s+=12; else if(ch<-8)s+=8; if(vol>=1e9)s+=25; else if(vol>=3e8)s+=20; else if(vol>=5e7)s+=12; if(mc>=1e10)s+=15; else if(mc>=1e9)s+=12; else if(mc>=1e8)s+=8; if(rank<=25)s+=10; else if(rank<=100)s+=7; else if(rank<=300)s+=4; return Math.max(0,Math.min(100,Math.round(s-penalty(c)))); }
function classify(s,d){ if(d.startsWith('危険')) return 'DANGER'; if(s>=70)return 'BUY_WATCH'; if(s>=50)return 'WATCH'; return 'NEUTRAL'; }
async function getMarket(){ const url='https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=80&page=1&sparkline=false&price_change_percentage=24h'; const r=await fetch(url); if(!r.ok)throw new Error('CoinGecko API error '+r.status); const data=await r.json(); return data.map(c=>{const sc=score(c), dg=danger(c); return {id:c.id,name:c.name,symbol:String(c.symbol||'').toUpperCase(),image:c.image,price:safeNumber(c.current_price),marketCap:safeNumber(c.market_cap),volume:safeNumber(c.total_volume),change24h:safeNumber(c.price_change_percentage_24h),rank:c.market_cap_rank,score:sc,danger:dg,className:classify(sc,dg)}}).sort((a,b)=>b.score-a.score); }
function findPos(sym){ return state.positions.find(p=>p.symbol===sym); }
function buy(c){ if(!state.paperTradingEnabled||state.positions.length>=CONFIG.maxPositions||findPos(c.symbol))return; if(c.score<CONFIG.minScoreToBuy||c.volume<CONFIG.minVolumeUsd||c.marketCap<CONFIG.minMarketCapUsd)return; if(c.change24h<3||c.change24h>12||c.danger!=='通常監視')return; const spend=state.cash*CONFIG.positionSizePct; if(spend<25||c.price<=0)return; state.cash-=spend; state.positions.push({id:c.symbol+'-'+Date.now(),symbol:c.symbol,name:c.name,image:c.image,entryPrice:c.price,qty:spend/c.price,cost:spend,openedAt:new Date().toISOString(),scoreAtEntry:c.score}); state.trades.unshift({type:'BUY',symbol:c.symbol,name:c.name,price:c.price,amountUsd:spend,pnlUsd:0,pnlPct:0,reason:'Score条件一致によるペーパー買い',time:new Date().toISOString()}); }
function sell(p,price,reason){ const value=p.qty*price, pnlUsd=value-p.cost, pnlPct=(price/p.entryPrice-1)*100; state.cash+=value; state.closedPnL+=pnlUsd; state.positions=state.positions.filter(x=>x.id!==p.id); state.trades.unshift({type:'SELL',symbol:p.symbol,name:p.name,price,amountUsd:value,pnlUsd,pnlPct,reason,time:new Date().toISOString()}); }
function updateTrades(market){ const map=new Map(market.map(c=>[c.symbol,c])); for(const p of [...state.positions]){ const c=map.get(p.symbol); if(!c)continue; const pnlPct=(c.price/p.entryPrice-1)*100; const hold=(Date.now()-new Date(p.openedAt).getTime())/3600000; if(pnlPct>=CONFIG.takeProfitPct)sell(p,c.price,'利確 +4%到達'); else if(pnlPct<=CONFIG.stopLossPct)sell(p,c.price,'損切り -2%到達'); else if(hold>=CONFIG.maxHoldHours)sell(p,c.price,'最大保有時間を超過'); } for(const c of market)buy(c); save(); }
function summary(market){ const map=new Map(market.map(c=>[c.symbol,c])); const positions=state.positions.map(p=>{ const c=map.get(p.symbol); const currentPrice=c?c.price:p.entryPrice; const value=p.qty*currentPrice; const pnlUsd=value-p.cost; const pnlPct=(currentPrice/p.entryPrice-1)*100; return {...p,currentPrice,value,pnlUsd,pnlPct}; }); const openValue=positions.reduce((a,p)=>a+p.value,0), totalEquity=state.cash+openValue; const sells=state.trades.filter(t=>t.type==='SELL'), wins=sells.filter(t=>t.pnlUsd>0).length; return {cash:state.cash,openValue,totalEquity,closedPnL:state.closedPnL,totalReturnPct:(totalEquity/state.startingCash-1)*100,winRate:sells.length?wins/sells.length*100:0,positions}; }
function pill(c){ return c.className==='BUY_WATCH'?'pill buy':c.className==='DANGER'?'pill danger-pill':'pill watch'; }
async function loadData(){ const st=document.getElementById('status'); st.textContent='市場データ取得中...'; try{ const market=await getMarket(); updateTrades(market); render(market); st.innerHTML='最終更新: '+new Date().toLocaleString('ja-JP')+'<br>無料静的版で稼働中'; }catch(e){ st.textContent='エラー: '+e.message; } }
function render(market){ const p=summary(market); document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">総資産</div><div class="value">${fmtUsd(p.totalEquity)}</div></div><div class="metric"><div class="label">現金</div><div class="value">${fmtUsd(p.cash)}</div></div><div class="metric"><div class="label">確定損益</div><div class="value ${cls(p.closedPnL)}">${fmtUsd(p.closedPnL)}</div></div><div class="metric"><div class="label">総リターン</div><div class="value ${cls(p.totalReturnPct)}">${fmtPct(p.totalReturnPct)}</div></div><div class="metric"><div class="label">勝率</div><div class="value">${fmtPct(p.winRate)}</div></div>`; document.getElementById('positions').innerHTML=`<tr><th>銘柄</th><th>Entry</th><th>Now</th><th>Value</th><th>PnL</th><th>Opened</th></tr>${p.positions.length?p.positions.map(pos=>`<tr><td>${pos.symbol} / ${pos.name}</td><td>${fmtUsd(pos.entryPrice)}</td><td>${fmtUsd(pos.currentPrice)}</td><td>${fmtUsd(pos.value)}</td><td class="${cls(pos.pnlUsd)}">${fmtUsd(pos.pnlUsd)} / ${fmtPct(pos.pnlPct)}</td><td>${new Date(pos.openedAt).toLocaleString('ja-JP')}</td></tr>`).join(''):'<tr><td colspan="6">現在ポジションなし</td></tr>'}`; const candidates=market.filter(c=>c.className==='BUY_WATCH'||c.score>=55).slice(0,18); document.getElementById('cards').innerHTML=candidates.map(c=>`<div class="card"><div class="coin-top"><img src="${c.image}" alt=""><div><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol} / Rank ${c.rank||'-'}</div></div></div><div class="score">${c.score}</div><div class="${pill(c)}">${c.className}・${c.danger}</div><div class="rows"><div class="row"><span>価格</span><strong>${fmtUsd(c.price)}</strong></div><div class="row"><span>24h</span><strong class="${cls(c.change24h)}">${fmtPct(c.change24h)}</strong></div><div class="row"><span>出来高</span><strong>${fmtBig(c.volume)}</strong></div><div class="row"><span>時価総額</span><strong>${fmtBig(c.marketCap)}</strong></div></div></div>`).join(''); document.getElementById('trades').innerHTML=`<tr><th>Time</th><th>Type</th><th>Symbol</th><th>Price</th><th>Amount</th><th>PnL</th><th>Reason</th></tr>${state.trades.length?state.trades.slice(0,30).map(t=>`<tr><td>${new Date(t.time).toLocaleString('ja-JP')}</td><td>${t.type}</td><td>${t.symbol}</td><td>${fmtUsd(t.price)}</td><td>${fmtUsd(t.amountUsd)}</td><td class="${cls(t.pnlUsd)}">${fmtUsd(t.pnlUsd)} / ${fmtPct(t.pnlPct)}</td><td>${t.reason}</td></tr>`).join(''):'<tr><td colspan="7">まだ取引ログなし</td></tr>'}`; }
function resetTrading(){ if(!confirm('ペーパートレードを初期化しますか？'))return; state={...defaultState,positions:[],trades:[]}; save(); loadData(); }
loadData(); setInterval(loadData,120000);
</script>
</body>
</html>
