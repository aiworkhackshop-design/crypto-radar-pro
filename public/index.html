<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crypto Alpha Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#030407;--line:rgba(255,255,255,.085);--text:#eef3ff;--muted:#79869f;--green:#66ffb5;--red:#ff7895;--blue:#7ab8ff;--yellow:#f2d27b;--violet:#b7a6ff}*{box-sizing:border-box}html,body{margin:0;overflow-x:hidden;background:#030407;color:var(--text);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;-webkit-font-smoothing:antialiased}body{background:radial-gradient(circle at 75% -20%,rgba(102,255,181,.10),transparent 34%),radial-gradient(circle at 10% 8%,rgba(122,184,255,.12),transparent 28%),linear-gradient(180deg,#06070b,#020306)}.shell{width:100%;max-width:1320px;margin:0 auto;padding:14px}.top{position:sticky;top:0;z-index:30;margin:-14px -14px 12px;padding:14px;background:rgba(3,4,7,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.topin{width:100%;max-width:1320px;margin:0 auto}.brand{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.title{margin:0;font-size:clamp(34px,8.8vw,76px);line-height:.92;letter-spacing:-.08em;max-width:100%;white-space:normal;overflow-wrap:break-word}.sub{margin-top:10px;color:var(--muted);font-size:clamp(12px,3.1vw,16px);line-height:1.6}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.btn{min-width:0;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.018));color:var(--text);padding:14px 12px;font:700 12px/1 "IBM Plex Mono";letter-spacing:.22em;text-transform:uppercase}.btn.danger{border-color:rgba(255,120,149,.26);background:rgba(255,120,149,.045);color:#ffc1cc}.perf{border:1px solid rgba(255,255,255,.10);background:radial-gradient(circle at 88% 0,rgba(102,255,181,.10),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.014));border-radius:22px;padding:13px;margin:12px 0;box-shadow:0 24px 80px rgba(0,0,0,.32)}.perfHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.smallcap{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#71809b}.serial{border:1px solid rgba(183,166,255,.25);background:rgba(183,166,255,.075);border-radius:999px;color:#ded6ff;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;white-space:normal;text-align:right}.perfGrid{display:grid;grid-template-columns:1.35fr repeat(5,1fr);gap:8px}.perfItem,.stat,.card,.metric,.mcard,.empty{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.010));border-radius:18px}.perfItem{padding:10px}.perfItem.primary{border-color:rgba(102,255,181,.20);background:linear-gradient(180deg,rgba(102,255,181,.075),rgba(102,255,181,.014))}.k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6d7892;margin-bottom:7px}.v{font-size:15px;line-height:1.45}.perfV{font-size:18px;font-weight:700;letter-spacing:-.04em}.ok,.plus{color:var(--green)}.warn,.yellow{color:var(--yellow)}.bad,.minus{color:var(--red)}.blue{color:var(--blue)}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{padding:12px}.hero{border:1px solid rgba(255,255,255,.10);background:radial-gradient(circle at 82% 0,rgba(102,255,181,.10),transparent 30%),linear-gradient(135deg,rgba(255,255,255,.042),rgba(255,255,255,.012));border-radius:24px;padding:16px;margin-bottom:14px}.heroRow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.command{font-size:clamp(28px,7vw,46px);line-height:1;letter-spacing:-.07em;font-weight:700;margin:6px 0}.copy{color:#a7b1c6;font-size:13px;line-height:1.75}.chip{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;white-space:nowrap}.chip.still{color:#d7deec;background:rgba(255,255,255,.035)}.chip.watch{color:var(--yellow);background:rgba(242,210,123,.08);border-color:rgba(242,210,123,.25)}.chip.active{color:var(--green);background:rgba(102,255,181,.08);border-color:rgba(102,255,181,.25)}.section{margin-top:18px}.sectionTitle{font-size:22px;font-weight:700;letter-spacing:-.04em;margin:4px 0 10px}.cockpit{border:1px solid rgba(255,255,255,.10);border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.010));overflow:hidden}.cockpitGrid{display:grid;grid-template-columns:minmax(0,1.55fr) 360px}.chartSide{padding:14px;border-right:1px solid rgba(255,255,255,.07)}.assetTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.asset{font-size:clamp(32px,8vw,54px);line-height:.95;font-weight:700;letter-spacing:-.07em}.meta{margin-top:8px;color:#7c879f;font-size:13px}.mini{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.mini span{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:999px;padding:8px 10px;font-size:11px}.chartWrap{position:relative;border:1px solid rgba(255,255,255,.08);border-radius:22px;background:#05070c;overflow:hidden}.chart{display:block;width:100%;height:520px}.overlay{position:absolute;inset:0;pointer-events:none;padding:12px;display:flex;flex-direction:column;justify-content:space-between}.legend{display:flex;gap:8px;flex-wrap:wrap}.legend span{border:1px solid rgba(255,255,255,.08);background:rgba(4,6,10,.72);backdrop-filter:blur(8px);border-radius:10px;padding:7px 9px;font-size:10px;color:#cad3e5}.ovGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.ov{border:1px solid rgba(255,255,255,.08);background:rgba(4,6,10,.80);border-radius:14px;padding:9px;backdrop-filter:blur(10px)}.ov .vv{font-size:15px;font-weight:700}.exec{padding:14px;display:flex;flex-direction:column;gap:10px}.box{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.024);border-radius:18px;padding:13px}.score{font-size:56px;line-height:.9;letter-spacing:-.08em;font-weight:700}.planGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.plan{border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:10px;background:rgba(255,255,255,.024)}.plan .vv{font-size:17px;font-weight:700}.bodytxt{font-size:13px;line-height:1.75;color:#c8d1e4}.list{margin:0;padding:0;list-style:none;display:grid;gap:7px}.list li{font-size:13px;line-height:1.55;color:#ccd5e8;display:flex;gap:8px}.list li:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--blue);margin-top:7px;flex:0 0 auto}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.card{padding:13px}.card.go{border-color:rgba(102,255,181,.20);background:rgba(102,255,181,.052)}.card.wait{border-color:rgba(242,210,123,.20);background:rgba(242,210,123,.045)}.card.risk{border-color:rgba(255,120,149,.20);background:rgba(255,120,149,.045)}.ttl{font-size:18px;font-weight:700;margin-bottom:6px}.cb{font-size:13px;line-height:1.65;color:#bbc5d8}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.metric{padding:14px}.metric .mv{font-size:30px;font-weight:700;letter-spacing:-.06em}.market{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.mcard{padding:14px}.mtop{display:flex;justify-content:space-between;gap:10px}.mname{font-size:28px;font-weight:700;letter-spacing:-.06em}.mscore{font-size:68px;font-weight:700;letter-spacing:-.08em;line-height:.9}.rows{display:grid;gap:7px;margin-top:10px}.row{display:grid;grid-template-columns:120px 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;font-size:13px}.empty{padding:16px;color:#93a0b9;font-size:13px;line-height:1.7}a{color:#a8ceff}@media(max-width:1050px){.cockpitGrid{grid-template-columns:1fr}.chartSide{border-right:0;border-bottom:1px solid rgba(255,255,255,.07)}.status,.grid3,.metrics{grid-template-columns:repeat(2,1fr)}.perfGrid{grid-template-columns:repeat(3,1fr)}.perfItem.primary{grid-column:span 2}.market{grid-template-columns:1fr}}@media(max-width:640px){.shell{padding:10px}.top{margin:-10px -10px 10px;padding:12px 10px}.brand{display:block}.status,.grid3,.metrics,.perfGrid,.ovGrid{grid-template-columns:1fr}.perfItem.primary{grid-column:auto}.perfHead{align-items:flex-start;flex-direction:column}.heroRow{grid-template-columns:1fr}.assetTop{display:block}.mini{justify-content:flex-start;margin-top:10px}.chart{height:420px}.cockpit{border-radius:20px}.btns{grid-template-columns:1fr 1fr}.title{font-size:clamp(36px,11vw,52px)}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand"><div><h1 class="title">Crypto Alpha Terminal</h1><div class="sub">漆黒の観測コックピットで、Base Line / Risk Floor / Objective Zone / VWAP / EMA を一画面に凝縮する分析端末。</div></div></div><div class="btns"><button class="btn" onclick="loadData()">Rescan</button><button class="btn danger" onclick="loadData()">Reset</button></div></div></header>
<div class="shell">
  <section class="perf" id="performanceBar"></section>
  <div class="status" id="statusStrip"></div>
  <section class="hero" id="hero"></section>
  <section class="section"><div class="smallcap">Primary Cockpit</div><div class="sectionTitle">本命観測セットアップ</div><div id="primary"></div></section>
  <section class="section"><div class="smallcap">Signals</div><div class="sectionTitle">観測フィード</div><div class="grid3" id="signals"></div></section>
  <section class="section"><div class="smallcap">Portfolio</div><div class="sectionTitle">概況</div><div class="metrics" id="metrics"></div></section>
  <section class="section"><div class="smallcap">Binance Only</div><div class="sectionTitle">公式ニュース検知</div><div class="grid3" id="news"></div></section>
  <section class="section"><div class="smallcap">Radar</div><div class="sectionTitle">全銘柄レーダー</div><div class="market" id="market"></div></section>
</div>
<script>
let lastPrimary=null;const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?5:2});const fmtPct=n=>Number(n||0).toFixed(2)+'%';const cls=n=>Number(n)>=0?'plus':'minus';
function sourceLabel(s){return s==='coinbase'?'<span class="ok">REAL: Coinbase</span>':s==='cache'?'<span class="warn">CACHE</span>':'<span class="bad">NO DATA</span>'}
function mode(c){if(!c||c.decision==='NO_TRADE')return{label:'監視モード：静止',chip:'still',copy:'統計検証・VWAP・EMA・出来高継続の条件合致待ち。観測を継続します。'};if(c.decision==='WATCH')return{label:'監視モード：追尾',chip:'watch',copy:'候補は形成中。直近出来高の継続性とVWAP保持を観測します。'};return{label:'重点監視：分析中',chip:'active',copy:'複数条件が合致。Base Line周辺の反応とRisk Floorまでの距離を観測します。'}}
function renderPerformance(p={}){const serial=p.licenseLabel||'Limited Intelligence Preview #004/100';performanceBar.innerHTML=`<div class="perfHead"><div><div class="smallcap">Performance Dashboard</div><div class="v" style="color:#97a4bd">Historical observation integrity / not a trading directive</div></div><div class="serial">${serial}</div></div><div class="perfGrid"><div class="perfItem primary"><div class="k">Performance</div><div class="perfV ${p.expectancy>0?'plus':p.expectancy<0?'minus':''}">${p.modelIntegrity||'LOADING'}</div></div><div class="perfItem"><div class="k">Win</div><div class="perfV">${Number.isFinite(Number(p.winRate))?Number(p.winRate).toFixed(1)+'%':'--'}</div></div><div class="perfItem"><div class="k">Exp</div><div class="perfV ${p.expectancy>0?'plus':p.expectancy<0?'minus':''}">${Number.isFinite(Number(p.expectancy))?Number(p.expectancy).toFixed(2)+'%':'--'}</div></div><div class="perfItem"><div class="k">Samples</div><div class="perfV">${p.samples??'--'}</div></div><div class="perfItem"><div class="k">Risk</div><div class="perfV">${p.riskPosture||'--'}</div></div><div class="perfItem"><div class="k">Filtered</div><div class="perfV">${p.filteredCount??'--'}</div></div></div>`}
function ema(v,p){const k=2/(p+1);let r=null;return v.map(x=>{r=r===null?x:x*k+r*(1-k);return r})}function vwap(d){let pv=0,vol=0;return d.map(c=>{const t=(c.high+c.low+c.close)/3;pv+=t*(c.volume||0);vol+=(c.volume||0);return vol?pv/vol:c.close})}
function draw(canvas,coin){const ctx=canvas.getContext('2d'),dpr=devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const W=rect.width,H=rect.height,data=coin.chart||[],plan=coin.plan||{};ctx.clearRect(0,0,W,H);ctx.fillStyle='#05070c';ctx.fillRect(0,0,W,H);if(!data.length)return;const pad={l:18,r:84,t:18,b:68},volH=68,priceH=H-pad.t-pad.b-volH,e20=ema(data.map(x=>x.close),20),e50=ema(data.map(x=>x.close),50),vw=vwap(data);let lows=data.map(x=>x.low).concat([plan.baseLine,plan.riskFloor,plan.objectiveZone1,plan.objectiveZone2,Math.min(...e20),Math.min(...e50),Math.min(...vw)]).filter(Boolean);let highs=data.map(x=>x.high).concat([plan.baseLine,plan.riskFloor,plan.objectiveZone1,plan.objectiveZone2,Math.max(...e20),Math.max(...e50),Math.max(...vw)]).filter(Boolean);let min=Math.min(...lows),max=Math.max(...highs),rng=max-min||1;min-=rng*.06;max+=rng*.06;const x=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(data.length-1,1),y=p=>pad.t+(max-p)/(max-min)*priceH;ctx.strokeStyle='rgba(255,255,255,.055)';for(let i=0;i<6;i++){let yy=pad.t+i*priceH/5;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke()}const maxVol=Math.max(...data.map(c=>c.volume),1),cw=Math.max(3,Math.min(9,(W-pad.l-pad.r)/data.length*.62));data.forEach((c,i)=>{const xx=x(i),up=c.close>=c.open;ctx.strokeStyle=up?'rgba(102,255,181,.72)':'rgba(255,120,149,.72)';ctx.fillStyle=up?'rgba(102,255,181,.9)':'rgba(255,120,149,.9)';ctx.beginPath();ctx.moveTo(xx,y(c.high));ctx.lineTo(xx,y(c.low));ctx.stroke();const top=Math.min(y(c.open),y(c.close)),bh=Math.max(2,Math.abs(y(c.open)-y(c.close)));ctx.fillRect(xx-cw/2,top,cw,bh);let vh=c.volume/maxVol*volH;ctx.globalAlpha=.24;ctx.fillRect(xx-cw/2,H-pad.b-vh,cw,vh);ctx.globalAlpha=1});function line(s,color,label,dash=false){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.1;if(dash)ctx.setLineDash([5,5]);ctx.beginPath();s.forEach((v,i)=>{if(!v)return;const xx=x(i),yy=y(v);i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy)});ctx.stroke();ctx.restore();ctx.fillStyle=color;ctx.font='600 10px IBM Plex Mono';ctx.fillText(label,pad.l+8,y(s[s.length-1])-6)}line(e20,'rgba(123,184,255,.82)','EMA20');line(e50,'rgba(183,166,255,.74)','EMA50');line(vw,'rgba(242,210,123,.78)','VWAP',true);function level(val,label,color){if(!val)return;const yy=y(val);ctx.strokeStyle=color;ctx.setLineDash([4,5]);ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=color;ctx.font='700 10px IBM Plex Mono';ctx.fillText(label,W-pad.r+8,yy+3)}level(plan.baseLine||plan.entry,'BASE','rgba(102,255,181,.95)');level(plan.riskFloor||plan.stop,'FLOOR','rgba(255,120,149,.95)');level(plan.objectiveZone1||plan.target1,'OBJ1','rgba(123,184,255,.95)');level(plan.objectiveZone2||plan.target2,'OBJ2','rgba(242,210,123,.95)');ctx.fillStyle='rgba(255,255,255,.05)';ctx.font='700 38px IBM Plex Mono';ctx.fillText(coin.symbol,pad.l+4,58)}
function renderPrimary(c){if(!c){primary.innerHTML='<div class="empty">本命観測セットアップなし</div>';return}lastPrimary=c;const p=c.plan||{},m=mode(c);primary.innerHTML=`<div class="cockpit"><div class="cockpitGrid"><div class="chartSide"><div class="assetTop"><div><div class="smallcap">Primary Observation</div><div class="asset">${c.name}</div><div class="meta">${c.symbol} / Rank ${c.rank||'-'} / ${c.setup}</div></div><div class="mini"><span>Price ${fmtUsd(c.price)}</span><span class="${cls(c.change24h)}">24H ${fmtPct(c.change24h)}</span><span class="${cls(c.trend6h)}">6H ${fmtPct(c.trend6h)}</span><span>VOL ${Number(c.volumeSpike||0).toFixed(2)}x</span></div></div><div class="chartWrap"><canvas class="chart" id="chart"></canvas><div class="overlay"><div class="legend"><span>EMA20</span><span>EMA50</span><span>VWAP</span><span>${m.label}</span></div><div class="ovGrid"><div class="ov"><div class="k">BASE LINE</div><div class="vv plus">${fmtUsd(p.baseLine||p.entry)}</div></div><div class="ov"><div class="k">RISK FLOOR</div><div class="vv minus">${fmtUsd(p.riskFloor||p.stop)}</div></div><div class="ov"><div class="k">OBJECTIVE 1</div><div class="vv blue">${fmtUsd(p.objectiveZone1||p.target1)}</div></div><div class="ov"><div class="k">OBJECTIVE 2</div><div class="vv yellow">${fmtUsd(p.objectiveZone2||p.target2)}</div></div><div class="ov"><div class="k">MODEL RATIO</div><div class="vv">${Number(p.rr||0).toFixed(2)}</div></div></div></div></div></div><aside class="exec"><div class="box"><div class="k">Observation State</div><div class="score">${c.score}</div><div class="planGrid"><div class="plan"><div class="k">Base Line</div><div class="vv plus">${fmtUsd(p.baseLine||p.entry)}</div></div><div class="plan"><div class="k">Risk Floor</div><div class="vv minus">${fmtUsd(p.riskFloor||p.stop)}</div></div><div class="plan"><div class="k">Objective 1</div><div class="vv blue">${fmtUsd(p.objectiveZone1||p.target1)}</div></div><div class="plan"><div class="k">Objective 2</div><div class="vv yellow">${fmtUsd(p.objectiveZone2||p.target2)}</div></div></div></div><div class="box"><div class="k">Analytical Brief</div><div class="bodytxt"><b>観測メモ:</b><br>${c.action}<br><br><b>姿勢:</b><br>${m.copy}</div></div><div class="box"><div class="k">Positive Factors</div><ul class="list">${(c.reasons||['優位性なし']).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><div class="k">Risk Controls</div><ul class="list">${((c.warnings&&c.warnings.length)?c.warnings:['条件合致まで観測。']).map(x=>`<li>${x}</li>`).join('')}</ul></div></aside></div></div>`;requestAnimationFrame(()=>draw(document.getElementById('chart'),c))}
function card(s){return `<div class="card ${s.tone==='go'?'go':s.tone==='risk'?'risk':'wait'}"><div class="smallcap">${s.type}</div><div class="ttl">${s.title}</div><div class="cb">${s.body}</div></div>`}function newsCard(n){return `<div class="card ${n.priority==='HIGH'?'go':'wait'}"><div class="smallcap">${n.source} / ${n.priority}</div><div class="ttl">${n.title}</div><div class="cb">通常監視<br><a href="${n.url}" target="_blank">公式ページ</a></div></div>`}function marketCard(c){let chip=c.decision==='HIGH_CONVICTION'?'active':c.decision==='WATCH'?'watch':'still';return `<div class="mcard"><div class="mtop"><div><div class="mname">${c.name}</div><div class="meta">${c.symbol} / ${c.setup}</div></div><span class="chip ${chip}">${c.decision}</span></div><div class="mscore">${c.score}</div><div class="bodytxt">${c.action}</div><div class="rows"><div class="row"><span>Price</span><b>${fmtUsd(c.price)}</b></div><div class="row"><span>24H</span><b class="${cls(c.change24h)}">${fmtPct(c.change24h)}</b></div><div class="row"><span>6H</span><b class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</b></div><div class="row"><span>Vol</span><b>${Number(c.volumeSpike||0).toFixed(2)}x</b></div><div class="row"><span>Model</span><b>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}件</b></div></div></div>`}
function render(d){let c=d.primary,m=mode(c),p=d.portfolio||{};renderPerformance(d.enginePerformance||{});statusStrip.innerHTML=`<div class="stat"><div class="k">Market Feed</div><div class="v">${sourceLabel(d.source)}</div></div><div class="stat"><div class="k">Update</div><div class="v">${new Date(d.updatedAt).toLocaleString('ja-JP')}</div></div><div class="stat"><div class="k">Mode</div><div class="v">${m.label}<br>LINE: ${d.notification?.enabled?'ON':'未設定'}</div></div><div class="stat"><div class="k">Engine</div><div class="v">Observation only<br>Binance news only</div></div>`;hero.innerHTML=`<div class="heroRow"><div><div class="smallcap">Alpha Intelligence</div><div class="command">${m.label}</div><div class="copy">${c?c.action:'条件合致なし。観測を継続します。'}</div></div><span class="chip ${m.chip}">${m.label}</span></div>`;renderPrimary(c);signals.innerHTML=(d.signals||[]).map(card).join('')||'<div class="empty">観測シグナルなし</div>';metrics.innerHTML=[['Total equity',fmtUsd(p.totalEquity)],['Cash',fmtUsd(p.cash)],['Closed P/L',fmtUsd(p.closedPnL),cls(p.closedPnL)],['Return',fmtPct(p.totalReturnPct),cls(p.totalReturnPct)],['Win rate',fmtPct(p.winRate)]].map(x=>`<div class="metric"><div class="k">${x[0]}</div><div class="mv ${x[2]||''}">${x[1]}</div></div>`).join('');news.innerHTML=(d.news||[]).map(newsCard).join('')||'<div class="empty">ニュースなし</div>';market.innerHTML=(d.market||[]).slice(0,10).map(marketCard).join('')||'<div class="empty">マーケットなし</div>'}
async function loadData(){renderPerformance({});try{let r=await fetch('/api/market?ts='+Date.now()),d=await r.json();if(!r.ok)throw new Error();render(d)}catch(e){statusStrip.innerHTML='<div class="empty">データ取得失敗</div>';primary.innerHTML='<div class="empty">本命観測セットアップなし</div>'}}window.addEventListener('resize',()=>{if(lastPrimary){let c=document.getElementById('chart');if(c)draw(c,lastPrimary)}});loadData();setInterval(loadData,120000);
</script>
</body>
</html>
