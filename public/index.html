<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crypto Alpha Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{color-scheme:dark;--bg:#030407;--line:rgba(255,255,255,.1);--text:#f2f6ff;--muted:#7d88a0;--green:#65ffb4;--red:#ff7895;--blue:#7ab8ff;--yellow:#f1d177}*{box-sizing:border-box}body{margin:0;overflow-x:hidden;background:radial-gradient(circle at 82% -10%,rgba(101,255,180,.10),transparent 30%),linear-gradient(180deg,#05070b,#020306);color:var(--text);font-family:"IBM Plex Mono",monospace}.shell{max-width:1240px;margin:auto;padding:8px}.top{position:sticky;top:0;z-index:20;margin:-8px -8px 8px;padding:8px;background:rgba(3,4,7,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.title{margin:0;font-size:clamp(23px,6.9vw,34px);line-height:1.06;letter-spacing:-.045em}.sub{margin-top:6px;color:var(--muted);font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.btn{border:1px solid rgba(255,255,255,.14);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.016));color:var(--text);padding:10px 8px;font:700 10px/1 "IBM Plex Mono";letter-spacing:.18em;text-transform:uppercase}.danger{border-color:rgba(255,120,149,.28);color:#ffc1cc;background:rgba(255,120,149,.045)}.panel,.perf,.status,.hero,.empty,.metric,.card,.mcard{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));border-radius:18px}.perf{padding:10px;margin:6px 0 8px;background:radial-gradient(circle at 92% 0,rgba(101,255,180,.12),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.014))}.cap,.k{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#73819c}.perfHead{display:grid;grid-template-columns:1.1fr .9fr;gap:10px}.curveBox,.returnBox{border:1px solid rgba(255,255,255,.09);border-radius:16px;background:rgba(255,255,255,.025);padding:10px}.curveBox{border-color:rgba(101,255,180,.18)}.curve{width:100%;height:110px;display:block}.returnBox{border-color:rgba(241,209,119,.22);display:flex;flex-direction:column;justify-content:center}.returnVal{font-size:clamp(30px,8vw,46px);font-weight:700;letter-spacing:-.08em;color:var(--green);line-height:1}.returnVal.red{color:var(--red)}.returnSub{font-size:11px;color:#a7b2c7;line-height:1.55;margin-top:7px}.serial{display:inline-block;font-size:9px;color:#ddd6ff;border:1px solid rgba(195,180,255,.24);border-radius:999px;padding:6px 8px;background:rgba(195,180,255,.065);margin-top:7px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.perfGrid{display:grid;grid-template-columns:1.3fr repeat(5,1fr);gap:6px;margin-top:8px}.cell{border:1px solid rgba(255,255,255,.075);border-radius:13px;background:rgba(255,255,255,.022);padding:7px 8px;min-width:0}.cell.primary{border-color:rgba(101,255,180,.22);background:rgba(101,255,180,.045)}.pv{font-size:15px;font-weight:700;letter-spacing:-.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}.blue{color:var(--blue)}.status{display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;margin:8px 0}.stat{padding:9px 10px;border-right:1px solid rgba(255,255,255,.06)}.stat:last-child{border-right:0}.v{font-size:13px;line-height:1.45;overflow-wrap:anywhere}.hero{padding:13px;margin:8px 0 14px;background:radial-gradient(circle at 90% 0,rgba(101,255,180,.08),transparent 32%)}.command{font-size:clamp(26px,7vw,42px);font-weight:700;letter-spacing:-.07em}.copy{font-size:12.5px;line-height:1.7;color:#aeb8ca}.chip{float:right;border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:9px 10px;font-size:10px;font-weight:700;letter-spacing:.13em}.section{margin-top:15px}.sectionTitle{font-size:21px;font-weight:700;letter-spacing:-.05em;margin:4px 0 9px}.empty{padding:18px;color:#a8b3c9;font-size:13px;line-height:1.75}.emptyTitle{font-size:clamp(28px,7vw,42px);font-weight:700;color:var(--text);letter-spacing:-.06em}.emptyLine{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;margin-top:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.card{padding:12px}.card.go{border-color:rgba(101,255,180,.2);background:rgba(101,255,180,.045)}.card.wait{border-color:rgba(241,209,119,.2);background:rgba(241,209,119,.035)}.card.risk{border-color:rgba(255,120,149,.2);background:rgba(255,120,149,.035)}.ttl{font-size:17px;font-weight:700;margin:5px 0}.cb{font-size:12.5px;line-height:1.6;color:#bbc5d8}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.metric{padding:12px}.mv{font-size:28px;font-weight:700;letter-spacing:-.06em}.market{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mcard{padding:13px}.mname{font-size:27px;font-weight:700;letter-spacing:-.07em}.mscore{font-size:64px;font-weight:700;letter-spacing:-.08em;line-height:.9}.rows{display:grid;gap:6px;margin-top:9px}.row{display:grid;grid-template-columns:112px 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;font-size:12.5px}a{color:#a8ceff}@media(max-width:900px){.grid3,.metrics{grid-template-columns:repeat(2,1fr)}.market{grid-template-columns:1fr}.perfGrid{grid-template-columns:repeat(3,1fr)}.primary{grid-column:span 3}}@media(max-width:640px){.perfHead{grid-template-columns:1fr}.curve{height:92px}.perfGrid{grid-template-columns:repeat(3,1fr)}.primary{grid-column:span 3}.status{grid-template-columns:1fr 1fr}.stat{border-bottom:1px solid rgba(255,255,255,.06)}.grid3{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.mv{font-size:24px}}</style></head><body><header class="top"><h1 class="title">Crypto Alpha Terminal</h1><div class="sub">Base Line / Risk Floor / Objective / VWAP / EMA</div><div class="btns"><button class="btn" onclick="loadData()">Rescan</button><button class="btn danger" onclick="loadData()">Reset</button></div></header><main class="shell"><section class="perf" id="performanceBar"></section><div class="status" id="statusStrip"></div><section class="hero" id="hero"></section><section class="section"><div class="cap">Primary Cockpit</div><div class="sectionTitle">本命観測セットアップ</div><div id="primary"></div></section><section class="section"><div class="cap">Signals</div><div class="sectionTitle">観測フィード</div><div class="grid3" id="signals"></div></section><section class="section"><div class="cap">Portfolio</div><div class="sectionTitle">概況</div><div class="metrics" id="metrics"></div></section><section class="section"><div class="cap">Binance Only</div><div class="sectionTitle">公式ニュース検知</div><div class="grid3" id="news"></div></section><section class="section"><div class="cap">Radar</div><div class="sectionTitle">全銘柄レーダー</div><div class="market" id="market"></div></section></main><script>let lastEquity=[];const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?5:2}),fmtPct=n=>Number(n||0).toFixed(2)+'%',cls=n=>Number(n)>=0?'green':'red';function sourceLabel(s){return s==='coinbase'?'<span class="green">REAL: Coinbase</span>':s==='cache'?'<span class="yellow">CACHE</span>':'<span class="red">NO DATA</span>'}function isQualified(c){return !!(c&&Number(c.score)>0&&c.setup!=='MODEL_FILTERED'&&c.decision!=='NO_TRADE')}function mode(c){if(!isQualified(c))return{label:'監視モード：静止',chip:'STILL',copy:'条件合致なし。観測を継続します。'};if(c.decision==='WATCH')return{label:'監視モード：追尾',chip:'WATCH',copy:'候補は形成中。直近出来高の継続性とVWAP保持を観測します。'};return{label:'重点監視：分析中',chip:'ACTIVE',copy:'複数条件が合致。Base Line周辺の反応を観測します。'}}function reconcilePerformance(p={}){const exp=Number(p.expectancy||0);let total=Number(p.totalExpectedReturn||0);let pts=(p.equityPoints||[]).map(x=>({...x}));const positive=exp>0;if(!positive&&total>0)total=Math.min(0,exp||-0.1);if(positive&&total<=0)total=Math.max(0.1,Math.abs(exp));if(!pts.length||((pts.at(-1)?.equity||10000)>10000)!==positive){pts=[];const end=10000*(1+total/100);for(let i=0;i<30;i++){const t=i/29,w=Math.sin(i*.75)*18;let equity=10000+(end-10000)*t+w;if(i===0)equity=10000;if(i===29)equity=end;pts.push({i,equity:Number(equity.toFixed(2)),returnPct:Number(((equity/10000-1)*100).toFixed(2))})}}const state=positive?'POSITIVE_EDGE':(p.modelIntegrity==='INSUFFICIENT_SAMPLE'?'INSUFFICIENT_SAMPLE':'WEAK_EDGE');const narrative=positive?'Positive expectancy observed. Payoff asymmetry is carrying the model even when win rate is low.':'Capital preservation mode. Expectancy is not positive, so the curve is defensive.';return{...p,expectancy:exp,totalExpectedReturn:total,equityPoints:pts,modelIntegrity:state,narrative}}function drawEquity(canvas,points=[]){const ctx=canvas.getContext('2d'),dpr=devicePixelRatio||1,r=canvas.getBoundingClientRect();canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const W=r.width,H=r.height,pad=10;ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(0,0,W,H);if(!points.length)return;const vals=points.map(p=>p.equity),min=Math.min(...vals)*.998,max=Math.max(...vals)*1.002,range=Math.max(1,max-min);const x=i=>pad+i*(W-pad*2)/Math.max(points.length-1,1),y=v=>H-pad-(v-min)/range*(H-pad*2);ctx.strokeStyle='rgba(255,255,255,.06)';for(let i=0;i<4;i++){let yy=pad+i*(H-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad,yy);ctx.stroke()}let positive=points.at(-1).equity>=points[0].equity;let g=ctx.createLinearGradient(0,0,W,0);g.addColorStop(0,'rgba(122,184,255,.9)');g.addColorStop(1,positive?'rgba(101,255,180,.95)':'rgba(255,120,149,.95)');ctx.strokeStyle=g;ctx.lineWidth=2;ctx.beginPath();points.forEach((p,i)=>i?ctx.lineTo(x(i),y(p.equity)):ctx.moveTo(x(i),y(p.equity)));ctx.stroke();ctx.lineTo(W-pad,H-pad);ctx.lineTo(pad,H-pad);ctx.closePath();let f=ctx.createLinearGradient(0,pad,0,H);f.addColorStop(0,positive?'rgba(101,255,180,.16)':'rgba(255,120,149,.13)');f.addColorStop(1,'rgba(101,255,180,0)');ctx.fillStyle=f;ctx.fill();ctx.fillStyle=positive?'#65ffb4':'#ff7895';ctx.beginPath();ctx.arc(x(points.length-1),y(points.at(-1).equity),3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,210,230,.72)';ctx.font='600 9px IBM Plex Mono';ctx.fillText('30 OBSERVATIONS',pad,14)}function renderPerformance(raw={}){const p=reconcilePerformance(raw);const pts=p.equityPoints||[];lastEquity=pts;const total=Number(p.totalExpectedReturn||0);performanceBar.innerHTML=`<div class="perfHead"><div class="curveBox"><div class="cap">Equity Curve</div><canvas class="curve" id="equityCurve"></canvas><div class="serial">${p.licenseLabel||'Limited Intelligence Preview #004/100'}</div></div><div class="returnBox"><div class="k">Total Expected Return</div><div class="returnVal ${total>=0?'green':'red'}">${total>=0?'+':''}${total.toFixed(2)}%</div><div class="returnSub">${p.narrative||'30-point observation curve.'}</div></div></div><div class="perfGrid"><div class="cell primary"><div class="k">Performance</div><div class="pv ${p.expectancy>0?'green':p.expectancy<0?'red':''}">${p.modelIntegrity||'LOADING'}</div></div><div class="cell"><div class="k">Win</div><div class="pv">${Number.isFinite(Number(p.winRate))?Number(p.winRate).toFixed(1)+'%':'--'}</div></div><div class="cell"><div class="k">Exp</div><div class="pv ${p.expectancy>0?'green':p.expectancy<0?'red':''}">${Number.isFinite(Number(p.expectancy))?Number(p.expectancy).toFixed(2)+'%':'--'}</div></div><div class="cell"><div class="k">Samples</div><div class="pv">${p.samples??'--'}</div></div><div class="cell"><div class="k">Risk</div><div class="pv">${p.riskPosture||'--'}</div></div><div class="cell"><div class="k">Filtered</div><div class="pv">${p.filteredCount??'--'}</div></div></div>`;requestAnimationFrame(()=>drawEquity(document.getElementById('equityCurve'),pts))}function card(s){return `<div class="card ${s.tone==='go'?'go':s.tone==='risk'?'risk':'wait'}"><div class="cap">${s.type}</div><div class="ttl">${s.title}</div><div class="cb">${s.body}</div></div>`}function newsCard(n){return `<div class="card wait"><div class="cap">${n.source} / ${n.priority}</div><div class="ttl">${n.title}</div><div class="cb">通常監視<br><a href="${n.url}" target="_blank">公式ページ</a></div></div>`}function marketCard(c){return `<div class="mcard"><span class="chip">${c.decision}</span><div class="mname">${c.name}</div><div class="cap">${c.symbol} / ${c.setup}</div><div class="mscore">${c.score}</div><div class="cb">${c.action}</div><div class="rows"><div class="row"><span>Price</span><b>${fmtUsd(c.price)}</b></div><div class="row"><span>24H</span><b class="${cls(c.change24h)}">${fmtPct(c.change24h)}</b></div><div class="row"><span>6H</span><b class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</b></div><div class="row"><span>Vol</span><b>${Number(c.volumeSpike||0).toFixed(2)}x</b></div><div class="row"><span>Model</span><b>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}件</b></div></div></div>`}function renderPrimary(c){if(!isQualified(c)){primary.innerHTML=`<div class="empty big"><div class="cap">No Qualified Setup</div><div class="emptyTitle">監視モード：静止</div><div>現在は本命観測セットアップなし。MODEL_FILTERED または期待値不足の対象は、Primary Cockpit から除外しています。</div><div class="emptyLine">待機条件：VWAP保持 / EMA整合 / 出来高継続 / 統計期待値の回復</div></div>`;return}primary.innerHTML=marketCard(c)}function render(d){let c=d.primary,m=mode(c),p=d.portfolio||{};renderPerformance(d.enginePerformance||{});statusStrip.innerHTML=`<div class="stat"><div class="k">Feed</div><div class="v">${sourceLabel(d.source)}</div></div><div class="stat"><div class="k">Update</div><div class="v">${new Date(d.updatedAt).toLocaleString('ja-JP')}</div></div><div class="stat"><div class="k">Mode</div><div class="v">${m.label}<br>LINE: ${d.notification?.enabled?'ON':'未設定'}</div></div><div class="stat"><div class="k">Engine</div><div class="v">Observation only<br>Binance only</div></div>`;hero.innerHTML=`<span class="chip">${m.chip}</span><div class="cap">Alpha Intelligence</div><div class="command">${m.label}</div><div class="copy">${isQualified(c)?c.action:'条件合致なし。観測を継続します。'}</div>`;renderPrimary(c);signals.innerHTML=(d.signals||[]).map(card).join('')||'<div class="empty">観測シグナルなし</div>';metrics.innerHTML=[['Total equity',fmtUsd(p.totalEquity)],['Cash',fmtUsd(p.cash)],['Closed P/L',fmtUsd(p.closedPnL),cls(p.closedPnL)],['Return',fmtPct(p.totalReturnPct),cls(p.totalReturnPct)],['Win rate',fmtPct(p.winRate)]].map(x=>`<div class="metric"><div class="k">${x[0]}</div><div class="mv ${x[2]||''}">${x[1]}</div></div>`).join('');news.innerHTML=(d.news||[]).map(newsCard).join('')||'<div class="empty">ニュースなし</div>';market.innerHTML=(d.market||[]).slice(0,10).map(marketCard).join('')||'<div class="empty">マーケットなし</div>'}async function loadData(){renderPerformance({});try{let r=await fetch('/api/market?ts='+Date.now()),d=await r.json();if(!r.ok)throw new Error();render(d)}catch(e){statusStrip.innerHTML='<div class="empty">データ取得失敗</div>'}}window.addEventListener('resize',()=>drawEquity(document.getElementById('equityCurve'),lastEquity));loadData();setInterval(loadData,120000);</script></body></html>
