<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crypto Radar Pro v2</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at top,#182236 0,#07080c 42%,#050505 100%); color:#f5f7fb; }
    header { position:sticky; top:0; z-index:10; backdrop-filter:blur(18px); background:rgba(5,5,8,.9); border-bottom:1px solid rgba(255,255,255,.08); padding:18px 16px; }
    .header-inner, main { max-width:1180px; margin:0 auto; }
    h1 { margin:0; font-size:26px; letter-spacing:-.04em; }
    .sub { color:#aab1c3; font-size:13px; margin-top:6px; line-height:1.5; }
    main { padding:16px; }
    .bar { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:14px; }
    button { border:0; border-radius:14px; padding:13px 14px; font-weight:900; font-size:15px; cursor:pointer; background:#f5f7fb; color:#06070a; }
    button.danger { background:#401313; color:#ffb7b7; border:1px solid rgba(255,80,80,.35); }
    .status,.panel,.card,.metric { background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.1); border-radius:18px; }
    .status { padding:12px 14px; color:#c6ccda; font-size:13px; line-height:1.55; }
    .source-ok { color:#8dffbd; font-weight:900; } .source-warn{color:#ffe089;font-weight:900;} .source-bad{color:#ffaaaa;font-weight:900;}
    .metrics { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin:14px 0; }
    .metric { padding:14px; }
    .metric .label { color:#aab1c3; font-size:12px; }
    .metric .value { font-size:22px; font-weight:950; margin-top:5px; letter-spacing:-.03em; }
    .section-title { margin:24px 0 10px; font-size:19px; }
    .grid { display:grid; grid-template-columns:1fr; gap:12px; }
    .card { padding:15px; box-shadow:0 18px 60px rgba(0,0,0,.22); }
    .top-card { border-color:rgba(141,255,189,.32); background:linear-gradient(180deg,rgba(68,255,151,.08),rgba(255,255,255,.045)); }
    .coin-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .coin-name { font-size:20px; font-weight:950; } .coin-symbol{color:#aab1c3;font-size:12px;margin-top:2px;}
    .score { font-size:42px; font-weight:1000; margin:10px 0; letter-spacing:-.06em; }
    .pill { display:inline-flex; align-items:center; border-radius:999px; padding:7px 10px; font-size:12px; font-weight:900; background:rgba(255,255,255,.08); color:#d7dbea; }
    .BUY_WATCH { background:rgba(68,255,151,.14); color:#8dffbd; border:1px solid rgba(68,255,151,.26); }
    .WATCH { background:rgba(255,214,90,.14); color:#ffe089; border:1px solid rgba(255,214,90,.26); }
    .AVOID,.DANGER { background:rgba(255,82,82,.14); color:#ffaaaa; border:1px solid rgba(255,82,82,.28); }
    .decision { margin:10px 0; display:flex; gap:8px; flex-wrap:wrap; }
    .rows { margin-top:12px; }
    .row { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-top:1px solid rgba(255,255,255,.08); font-size:13px; }
    .row span:first-child { color:#aab1c3; }
    .plus{color:#7dff9f;} .minus{color:#ff8585;}
    .reason-list { margin:12px 0 0; padding-left:18px; color:#e8ebf5; font-size:13px; line-height:1.6; }
    .warnings { margin-top:10px; color:#ffe089; font-size:13px; line-height:1.6; }
    .action { margin-top:10px; padding:10px; background:rgba(255,255,255,.055); border-radius:12px; color:#dbe1ef; font-size:13px; line-height:1.55; }
    .table { overflow:auto; border:1px solid rgba(255,255,255,.1); border-radius:18px; }
    table { width:100%; border-collapse:collapse; min-width:760px; background:rgba(255,255,255,.045); }
    th,td { padding:11px 10px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; font-size:13px; }
    th { color:#aab1c3; font-weight:900; }
    .empty { color:#aab1c3; padding:18px; border:1px solid rgba(255,255,255,.1); border-radius:18px; background:rgba(255,255,255,.04); line-height:1.6; }
    a{color:#9ecbff;} .notice{margin-top:18px;color:#aab1c3;font-size:12px;line-height:1.6;}
    @media(min-width:780px){.bar{grid-template-columns:1fr 180px 180px;align-items:center}.metrics{grid-template-columns:repeat(5,minmax(0,1fr))}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
  </style>
</head>
<body>
<header><div class="header-inner"><h1>Crypto Radar Pro v2</h1><div class="sub">実データ・短期トレンド・出来高急増・簡易バックテストで、買う前の判断材料を出すレーダー。</div></div></header>
<main>
  <div class="bar"><div class="status" id="status">起動中です。最新データを取得します。</div><button onclick="loadData()">更新</button><button class="danger" onclick="resetTrading()">リセット</button></div>
  <div class="metrics" id="metrics"></div>
  <h2 class="section-title">今日見るべき銘柄 TOP5</h2><div class="grid" id="topCards"></div>
  <h2 class="section-title">保有中ポジション</h2><div class="table"><table id="positions"></table></div>
  <h2 class="section-title">全レーダー</h2><div class="grid" id="cards"></div>
  <h2 class="section-title">取引ログ</h2><div class="table"><table id="trades"></table></div>
  <h2 class="section-title">公式ニュースリンク</h2><div class="panel card" id="news">読み込み中...</div>
  <div class="notice">注意: これはペーパートレード用MVPです。実売買・投資助言ではありません。売買判断は必ずご自身で行ってください。</div>
</main>
<script>
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?6:2});
const fmtPct=n=>Number(n||0).toFixed(2)+'%';
const fmtBig=n=>{n=Number(n||0);if(n<=0)return'N/A';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString('en-US')};
const cls=n=>Number(n)>=0?'plus':'minus';
function sourceLabel(d){if(d.source==='coinbase')return'<span class="source-ok">REAL: Coinbase</span>';if(d.source==='cache')return'<span class="source-warn">CACHE</span>';return'<span class="source-bad">NO DATA</span>'}
async function loadData(){const s=document.getElementById('status');s.textContent='市場データ取得中...';try{const r=await fetch('/api/market?ts='+Date.now());const d=await r.json();if(!r.ok)throw new Error(d.message||'取得失敗');render(d)}catch(e){s.innerHTML='<span class="source-bad">取得失敗</span><br>'+e.message;renderEmpty()}}
function renderEmpty(){document.getElementById('metrics').innerHTML='';document.getElementById('positions').innerHTML='<tr><td>データなし</td></tr>';document.getElementById('topCards').innerHTML='<div class="empty">リアルデータなし</div>';document.getElementById('cards').innerHTML='<div class="empty">リアルデータなし</div>';document.getElementById('trades').innerHTML='<tr><td>データなし</td></tr>'}
function coinCard(c,top=false){const warn=(c.warnings||[]).length?`<div class="warnings">⚠ ${c.warnings.join('<br>⚠ ')}</div>`:'';return `<div class="card ${top?'top-card':''}"><div class="coin-top"><div><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol} / Rank ${c.rank||'-'}</div></div><div class="pill ${c.decision||c.className}">${c.decision||c.className}</div></div><div class="score">${c.score}</div><div class="action"><b>想定:</b> ${c.action||'判断材料不足'}</div><ul class="reason-list">${(c.reasons||['根拠不足']).map(x=>`<li>${x}</li>`).join('')}</ul>${warn}<div class="rows"><div class="row"><span>価格</span><strong>${fmtUsd(c.price)}</strong></div><div class="row"><span>24h</span><strong class="${cls(c.change24h)}">${fmtPct(c.change24h)}</strong></div><div class="row"><span>6hトレンド</span><strong class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</strong></div><div class="row"><span>出来高倍率</span><strong>${Number(c.volumeSpike||0).toFixed(2)}x</strong></div><div class="row"><span>簡易BT勝率</span><strong>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}回</strong></div><div class="row"><span>期待値</span><strong class="${cls(c.backtest?.expectancy||0)}">${fmtPct(c.backtest?.expectancy||0)}</strong></div><div class="row"><span>出来高</span><strong>${fmtBig(c.volume)}</strong></div></div></div>`}
function render(d){const p=d.portfolio;const warn=d.warning?`<br><span class="source-warn">${d.warning}</span>`:'';document.getElementById('status').innerHTML=`最終更新: ${new Date(d.updatedAt).toLocaleString('ja-JP')}<br>データソース: ${sourceLabel(d)}${warn}<br>ペーパートレード: ${d.trading.paperTradingEnabled?'ON':'OFF'} ${d.trading.pausedReason?' / '+d.trading.pausedReason:''}`;document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">総資産</div><div class="value">${fmtUsd(p.totalEquity)}</div></div><div class="metric"><div class="label">現金</div><div class="value">${fmtUsd(p.cash)}</div></div><div class="metric"><div class="label">確定損益</div><div class="value ${cls(p.closedPnL)}">${fmtUsd(p.closedPnL)}</div></div><div class="metric"><div class="label">総リターン</div><div class="value ${cls(p.totalReturnPct)}">${fmtPct(p.totalReturnPct)}</div></div><div class="metric"><div class="label">勝率</div><div class="value">${fmtPct(p.winRate)}</div></div>`;document.getElementById('topCards').innerHTML=(d.top||[]).length?(d.top||[]).map(c=>coinCard(c,true)).join(''):'<div class="empty">TOP候補なし</div>';document.getElementById('positions').innerHTML=`<tr><th>銘柄</th><th>Entry</th><th>Now</th><th>Value</th><th>PnL</th><th>Opened</th></tr>${p.positions.length?p.positions.map(pos=>`<tr><td>${pos.symbol} / ${pos.name}</td><td>${fmtUsd(pos.entryPrice)}</td><td>${fmtUsd(pos.currentPrice)}</td><td>${fmtUsd(pos.value)}</td><td class="${cls(pos.pnlUsd)}">${fmtUsd(pos.pnlUsd)} / ${fmtPct(pos.pnlPct)}</td><td>${new Date(pos.openedAt).toLocaleString('ja-JP')}</td></tr>`).join(''):'<tr><td colspan="6">現在ポジションなし</td></tr>'}`;document.getElementById('cards').innerHTML=(d.market||[]).length?(d.market||[]).map(c=>coinCard(c,false)).join(''):'<div class="empty">リアルデータなし</div>';document.getElementById('trades').innerHTML=`<tr><th>Time</th><th>Type</th><th>Symbol</th><th>Price</th><th>Amount</th><th>PnL</th><th>Reason</th></tr>${d.trades.length?d.trades.slice(0,30).map(t=>`<tr><td>${new Date(t.time).toLocaleString('ja-JP')}</td><td>${t.type}</td><td>${t.symbol}</td><td>${fmtUsd(t.price)}</td><td>${fmtUsd(t.amountUsd)}</td><td class="${cls(t.pnlUsd)}">${fmtUsd(t.pnlUsd)} / ${fmtPct(t.pnlPct)}</td><td>${t.reason}</td></tr>`).join(''):'<tr><td colspan="7">まだ取引ログなし</td></tr>'}`}
async function resetTrading(){if(!confirm('ペーパートレードを初期化しますか？'))return;await fetch('/api/trading/reset',{method:'POST'});loadData()}
async function loadNews(){const r=await fetch('/api/news');const d=await r.json();document.getElementById('news').innerHTML=d.sources.map(s=>`<p><a href="${s.url}" target="_blank">${s.name}</a></p>`).join('')+`<p>${d.note}</p>`}
loadData();loadNews();setInterval(loadData,120000);
</script>
</body>
</html>
