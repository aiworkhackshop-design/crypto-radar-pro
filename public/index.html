<html lang="ja">

<style>
:root{color-scheme:dark;--bg:#030407;--panel:#0a0d12;--line:rgba(255,255,255,.09);--text:#f1f5ff;--muted:#7c879f;--green:#65ffb4;--red:#ff7895;--blue:#7ab8ff;--yellow:#f1d177;--violet:#c3b4ff}*{box-sizing:border-box}html,body{margin:0;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;-webkit-font-smoothing:antialiased}body{background:radial-gradient(circle at 82% -14%,rgba(101,255,180,.10),transparent 28%),radial-gradient(circle at 6% 2%,rgba(122,184,255,.10),transparent 26%),linear-gradient(180deg,#05070b,#020306)}.shell{max-width:1280px;margin:0 auto;padding:10px}.top{position:sticky;top:0;z-index:50;margin:-10px -10px 8px;padding:9px 10px;background:rgba(3,4,7,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.title{margin:0;font-size:clamp(28px,9vw,58px);line-height:.92;letter-spacing:-.09em;max-width:100%;overflow-wrap:break-word}.sub{margin-top:6px;color:var(--muted);font-size:clamp(10px,2.8vw,14px);line-height:1.45}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{border:1px solid rgba(255,255,255,.13);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.016));color:var(--text);padding:11px 8px;font:700 11px/1 "IBM Plex Mono";letter-spacing:.2em;text-transform:uppercase}.btn.danger{border-color:rgba(255,120,149,.26);background:rgba(255,120,149,.045);color:#ffc1cc}.panel,.perf,.status,.hero,.empty,.metric,.card,.mcard,.cockpit{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.038),rgba(255,255,255,.012));border-radius:18px}.perf{padding:9px;margin:6px 0 8px;background:radial-gradient(circle at 95% 0,rgba(101,255,180,.095),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.014))}.perfTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}.cap,.k{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#73819c}.serial{font-size:9px;color:#ddd6ff;border:1px solid rgba(195,180,255,.24);border-radius:999px;padding:6px 8px;background:rgba(195,180,255,.065);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}.perfGrid{display:grid;grid-template-columns:1.3fr repeat(5,1fr);gap:6px}.perfCell{border:1px solid rgba(255,255,255,.075);border-radius:13px;background:rgba(255,255,255,.022);padding:7px 8px;min-width:0}.perfCell.primary{border-color:rgba(101,255,180,.20);background:rgba(101,255,180,.048)}.pv{font-size:15px;font-weight:700;letter-spacing:-.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.green,.ok{color:var(--green)}.red,.bad{color:var(--red)}.yellow,.warn{color:var(--yellow)}.blue{color:var(--blue)}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:0;overflow:hidden;margin:8px 0}.stat{padding:9px 10px;border-right:1px solid rgba(255,255,255,.06);min-width:0}.stat:last-child{border-right:0}.v{font-size:13px;line-height:1.45;white-space:normal;overflow-wrap:anywhere}.hero{padding:13px;margin:8px 0 14px;background:radial-gradient(circle at 90% 0,rgba(101,255,180,.08),transparent 32%),linear-gradient(135deg,rgba(255,255,255,.042),rgba(255,255,255,.012))}.heroRow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.command{font-size:clamp(25px,7vw,40px);line-height:1;letter-spacing:-.07em;font-weight:700;margin:5px 0}.copy{color:#aeb8ca;font-size:12.5px;line-height:1.65}.chip{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:9px 10px;font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;white-space:nowrap}.chip.still{color:#dbe1ee;background:rgba(255,255,255,.035)}.chip.watch{color:var(--yellow);background:rgba(241,209,119,.075);border-color:rgba(241,209,119,.24)}.chip.active{color:var(--green);background:rgba(101,255,180,.075);border-color:rgba(101,255,180,.24)}.section{margin-top:15px}.sectionTitle{font-size:21px;font-weight:700;letter-spacing:-.05em;margin:4px 0 9px}.empty{padding:18px;color:#a8b3c9;font-size:13px;line-height:1.75}.empty.big{background:radial-gradient(circle at 92% 0,rgba(101,255,180,.075),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.010))}.emptyTitle{font-size:clamp(28px,7vw,42px);line-height:1;font-weight:700;letter-spacing:-.06em;color:var(--text);margin:7px 0}.emptyLine{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;margin-top:12px;background:rgba(255,255,255,.018);color:#cbd4e6}.cockpit{overflow:hidden}.cockpitGrid{display:grid;grid-template-columns:minmax(0,1.55fr) 360px}.chartSide{padding:12px;border-right:1px solid rgba(255,255,255,.07)}.assetTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:9px}.asset{font-size:clamp(30px,8vw,52px);line-height:.95;font-weight:700;letter-spacing:-.08em}.meta{margin-top:7px;color:#7f8aa2;font-size:12px}.mini{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.mini span{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:999px;padding:7px 9px;font-size:10px}.chartWrap{position:relative;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:#05070c;overflow:hidden}.chart{display:block;width:100%;height:460px}.overlay{position:absolute;inset:0;pointer-events:none;padding:10px;display:flex;flex-direction:column;justify-content:space-between}.legend{display:flex;gap:6px;flex-wrap:wrap}.legend span,.ov{border:1px solid rgba(255,255,255,.08);background:rgba(4,6,10,.78);backdrop-filter:blur(8px)}.legend span{border-radius:9px;padding:6px 8px;font-size:9px;color:#cad3e5}.ovGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.ov{border-radius:12px;padding:8px}.ov .vv{font-size:14px;font-weight:700}.exec{padding:12px;display:flex;flex-direction:column;gap:9px}.box{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.024);border-radius:16px;padding:12px}.score{font-size:52px;line-height:.9;letter-spacing:-.08em;font-weight:700}.planGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.plan{border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:9px;background:rgba(255,255,255,.024)}.plan .vv{font-size:16px;font-weight:700}.bodytxt{font-size:12.5px;line-height:1.7;color:#c8d1e4}.list{margin:0;padding:0;list-style:none;display:grid;gap:7px}.list li{font-size:12.5px;line-height:1.55;color:#ccd5e8;display:flex;gap:8px}.list li:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--blue);margin-top:7px;flex:0 0 auto}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.card{padding:12px}.card.go{border-color:rgba(101,255,180,.20);background:rgba(101,255,180,.048)}.card.wait{border-color:rgba(241,209,119,.20);background:rgba(241,209,119,.04)}.card.risk{border-color:rgba(255,120,149,.20);background:rgba(255,120,149,.04)}.ttl{font-size:17px;font-weight:700;margin:5px 0}.cb{font-size:12.5px;line-height:1.6;color:#bbc5d8}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.metric{padding:12px}.metric .mv{font-size:28px;font-weight:700;letter-spacing:-.06em}.market{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mcard{padding:13px}.mtop{display:flex;justify-content:space-between;gap:10px}.mname{font-size:27px;font-weight:700;letter-spacing:-.07em}.mscore{font-size:64px;font-weight:700;letter-spacing:-.08em;line-height:.9}.rows{display:grid;gap:6px;margin-top:9px}.row{display:grid;grid-template-columns:112px 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;font-size:12.5px}a{color:#a8ceff}@media(max-width:1050px){.cockpitGrid{grid-template-columns:1fr}.chartSide{border-right:0;border-bottom:1px solid rgba(255,255,255,.07)}.grid3,.metrics{grid-template-columns:repeat(2,1fr)}.perfGrid{grid-template-columns:repeat(3,1fr)}.perfCell.primary{grid-column:span 2}.market{grid-template-columns:1fr}}@media(max-width:640px){.shell{padding:8px}.top{margin:-8px -8px 8px;padding:9px 8px}.title{font-size:clamp(26px,8vw,34px);line-height:1.04;letter-spacing:-.06em}.sub{font-size:10px;line-height:1.35}.btns{margin-top:9px;gap:8px}.btn{padding:11px 8px}.perf{padding:9px;margin:6px 0 8px;border-radius:18px}.perfTop{align-items:flex-start;flex-direction:column}.serial{max-width:100%;width:100%;text-align:left}.perfGrid{grid-template-columns:repeat(3,1fr);gap:6px}.perfCell.primary{grid-column:span 3}.perfCell{padding:7px}.pv{font-size:14px}.status{grid-template-columns:1fr 1fr}.stat{border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);padding:8px}.stat:nth-child(2n){border-right:0}.stat:nth-child(n+3){border-bottom:0}.v{font-size:12px}.heroRow{grid-template-columns:1fr}.grid3,.ovGrid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.metric{padding:11px}.metric .mv{font-size:24px}.assetTop{display:block}.mini{justify-content:flex-start;margin-top:9px}.chart{height:380px}.cockpit{border-radius:18px}.section{margin-top:14px}}
</style>
</head>
<body>
<header class="top"><div class="topin"><h1 class="title">Crypto Alpha Terminal</h1><div class="sub">Base Line / Risk Floor / Objective / VWAP / EMA</div><div class="btns"><button class="btn" onclick="loadData()">Rescan</button><button class="btn danger" onclick="loadData()">Reset</button></div></div></header>
<div class="shell">
<section class="perf" id="performanceBar"></section>
<div class="status" id="statusStrip"></div>
<section class="hero" id="hero"></section>
<section class="section"><div class="cap">Primary Cockpit</div><div class="sectionTitle">本命観測セットアップ</div><div id="primary"></div></section>
<section class="section"><div class="cap">Signals</div><div class="sectionTitle">観測フィード</div><div class="grid3" id="signals"></div></section>
<section class="section"><div class="cap">Portfolio</div><div class="sectionTitle">概況</div><div class="metrics" id="metrics"></div></section>
<section class="section"><div class="cap">Binance Only</div><div class="sectionTitle">公式ニュース検知</div><div class="grid3" id="news"></div></section>
<section class="section"><div class="cap">Radar</div><div class="sectionTitle">全銘柄レーダー</div><div class="market" id="market"></div></section>
</div>
<script>
let lastPrimary=null;const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?5:2});const fmtPct=n=>Number(n||0).toFixed(2)+'%';const cls=n=>Number(n)>=0?'green':'red';
function sourceLabel(s){return s==='coinbase'?'<span class="green">REAL: Coinbase</span>':s==='cache'?'<span class="yellow">CACHE</span>':'<span class="red">NO DATA</span>'}
function isQualified(c){return !!(c&&Number(c.score)>0&&c.setup!=='MODEL_FILTERED'&&c.decision!=='NO_TRADE')}
function mode(c){if(!isQualified(c))return{label:'監視モード：静止',chip:'still',copy:'条件合致なし。観測を継続します。'};if(c.decision==='WATCH')return{label:'監視モード：追尾',chip:'watch',copy:'候補は形成中。直近出来高の継続性とVWAP保持を観測します。'};return{label:'重点監視：分析中',chip:'active',copy:'複数条件が合致。Base Line周辺の反応とRisk Floorまでの距離を観測します。'}}
function renderPerformance(p={}){const serial=p.licenseLabel||'Limited Intelligence Preview #004/100';performanceBar.innerHTML=`<div class="perfTop"><div><div class="cap">Performance Dashboard</div><div class="v" style="color:#9aa6bb">Observation integrity / not a trading directive</div></div><div class="serial">${serial}</div></div><div class="perfGrid"><div class="perfCell primary"><div class="k">Performance</div><div class="pv ${p.expectancy>0?'green':p.expectancy<0?'red':''}">${p.modelIntegrity||'LOADING'}</div></div><div class="perfCell"><div class="k">Win</div><div class="pv">${Number.isFinite(Number(p.winRate))?Number(p.winRate).toFixed(1)+'%':'--'}</div></div><div class="perfCell"><div class="k">Exp</div><div class="pv ${p.expectancy>0?'green':p.expectancy<0?'red':''}">${Number.isFinite(Number(p.expectancy))?Number(p.expectancy).toFixed(2)+'%':'--'}</div></div><div class="perfCell"><div class="k">Samples</div><div class="pv">${p.samples??'--'}</div></div><div class="perfCell"><div class="k">Risk</div><div class="pv">${p.riskPosture||'--'}</div></div><div class="perfCell"><div class="k">Filtered</div><div class="pv">${p.filteredCount??'--'}</div></div></div>`}
function ema(v,p){const k=2/(p+1);let r=null;return v.map(x=>{r=r===null?x:x*k+r*(1-k);return r})}function vwap(d){let pv=0,vol=0;return d.map(c=>{const t=(c.high+c.low+c.close)/3;pv+=t*(c.volume||0);vol+=(c.volume||0);return vol?pv/vol:c.close})}
function draw(canvas,coin){const ctx=canvas.getContext('2d'),dpr=devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const W=rect.width,H=rect.height,data=coin.chart||[],plan=coin.plan||{};ctx.clearRect(0,0,W,H);ctx.fillStyle='#05070c';ctx.fillRect(0,0,W,H);if(!data.length)return;const pad={l:18,r:78,t:18,b:60},volH=58,priceH=H-pad.t-pad.b-volH,e20=ema(data.map(x=>x.close),20),e50=ema(data.map(x=>x.close),50),vw=vwap(data);let lows=data.map(x=>x.low).concat([plan.baseLine,plan.riskFloor,plan.objectiveZone1,plan.objectiveZone2,Math.min(...e20),Math.min(...e50),Math.min(...vw)]).filter(Boolean);let highs=data.map(x=>x.high).concat([plan.baseLine,plan.riskFloor,plan.objectiveZone1,plan.objectiveZone2,Math.max(...e20),Math.max(...e50),Math.max(...vw)]).filter(Boolean);let min=Math.min(...lows),max=Math.max(...highs),rng=max-min||1;min-=rng*.06;max+=rng*.06;const x=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(data.length-1,1),y=p=>pad.t+(max-p)/(max-min)*priceH;ctx.strokeStyle='rgba(255,255,255,.055)';for(let i=0;i<6;i++){let yy=pad.t+i*priceH/5;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke()}const maxVol=Math.max(...data.map(c=>c.volume),1),cw=Math.max(3,Math.min(8,(W-pad.l-pad.r)/data.length*.62));data.forEach((c,i)=>{const xx=x(i),up=c.close>=c.open;ctx.strokeStyle=up?'rgba(101,255,180,.72)':'rgba(255,120,149,.72)';ctx.fillStyle=up?'rgba(101,255,180,.9)':'rgba(255,120,149,.9)';ctx.beginPath();ctx.moveTo(xx,y(c.high));ctx.lineTo(xx,y(c.low));ctx.stroke();const top=Math.min(y(c.open),y(c.close)),bh=Math.max(2,Math.abs(y(c.open)-y(c.close)));ctx.fillRect(xx-cw/2,top,cw,bh);let vh=c.volume/maxVol*volH;ctx.globalAlpha=.24;ctx.fillRect(xx-cw/2,H-pad.b-vh,cw,vh);ctx.globalAlpha=1});function line(s,color,label,dash=false){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.05;if(dash)ctx.setLineDash([5,5]);ctx.beginPath();s.forEach((v,i)=>{if(!v)return;const xx=x(i),yy=y(v);i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy)});ctx.stroke();ctx.restore();ctx.fillStyle=color;ctx.font='600 9px IBM Plex Mono';ctx.fillText(label,pad.l+8,y(s[s.length-1])-6)}line(e20,'rgba(122,184,255,.82)','EMA20');line(e50,'rgba(195,180,255,.74)','EMA50');line(vw,'rgba(241,209,119,.78)','VWAP',true);function level(val,label,color){if(!val)return;const yy=y(val);ctx.strokeStyle=color;ctx.setLineDash([4,5]);ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=color;ctx.font='700 9px IBM Plex Mono';ctx.fillText(label,W-pad.r+7,yy+3)}level(plan.baseLine||plan.entry,'BASE','rgba(101,255,180,.95)');level(plan.riskFloor||plan.stop,'FLOOR','rgba(255,120,149,.95)');level(plan.objectiveZone1||plan.target1,'OBJ1','rgba(122,184,255,.95)');level(plan.objectiveZone2||plan.target2,'OBJ2','rgba(241,209,119,.95)');ctx.fillStyle='rgba(255,255,255,.045)';ctx.font='700 34px IBM Plex Mono';ctx.fillText(coin.symbol,pad.l+4,54)}
function renderPrimary(c){if(!isQualified(c)){lastPrimary=null;primary.innerHTML=`<div class="empty big"><div class="cap">No Qualified Setup</div><div class="emptyTitle">監視モード：静止</div><div>現在は本命観測セットアップなし。MODEL_FILTERED または期待値不足の対象は、Primary Cockpit から除外しています。</div><div class="emptyLine">待機条件：VWAP保持 / EMA整合 / 出来高継続 / 統計期待値の回復</div></div>`;return}lastPrimary=c;const p=c.plan||{},m=mode(c);primary.innerHTML=`<div class="cockpit"><div class="cockpitGrid"><div class="chartSide"><div class="assetTop"><div><div class="cap">Primary Observation</div><div class="asset">${c.name}</div><div class="meta">${c.symbol} / Rank ${c.rank||'-'} / ${c.setup}</div></div><div class="mini"><span>Price ${fmtUsd(c.price)}</span><span class="${cls(c.change24h)}">24H ${fmtPct(c.change24h)}</span><span class="${cls(c.trend6h)}">6H ${fmtPct(c.trend6h)}</span><span>VOL ${Number(c.volumeSpike||0).toFixed(2)}x</span></div></div><div class="chartWrap"><canvas class="chart" id="chart"></canvas><div class="overlay"><div class="legend"><span>EMA20</span><span>EMA50</span><span>VWAP</span><span>${m.label}</span></div><div class="ovGrid"><div class="ov"><div class="k">BASE LINE</div><div class="vv green">${fmtUsd(p.baseLine||p.entry)}</div></div><div class="ov"><div class="k">RISK FLOOR</div><div class="vv red">${fmtUsd(p.riskFloor||p.stop)}</div></div><div class="ov"><div class="k">OBJECTIVE 1</div><div class="vv blue">${fmtUsd(p.objectiveZone1||p.target1)}</div></div><div class="ov"><div class="k">OBJECTIVE 2</div><div class="vv yellow">${fmtUsd(p.objectiveZone2||p.target2)}</div></div><div class="ov"><div class="k">MODEL RATIO</div><div class="vv">${Number(p.rr||0).toFixed(2)}</div></div></div></div></div></div><aside class="exec"><div class="box"><div class="k">Observation State</div><div class="score">${c.score}</div><div class="planGrid"><div class="plan"><div class="k">Base Line</div><div class="vv green">${fmtUsd(p.baseLine||p.entry)}</div></div><div class="plan"><div class="k">Risk Floor</div><div class="vv red">${fmtUsd(p.riskFloor||p.stop)}</div></div><div class="plan"><div class="k">Objective 1</div><div class="vv blue">${fmtUsd(p.objectiveZone1||p.target1)}</div></div><div class="plan"><div class="k">Objective 2</div><div class="vv yellow">${fmtUsd(p.objectiveZone2||p.target2)}</div></div></div></div><div class="box"><div class="k">Analytical Brief</div><div class="bodytxt"><b>観測メモ:</b><br>${c.action}<br><br><b>姿勢:</b><br>${m.copy}</div></div><div class="box"><div class="k">Positive Factors</div><ul class="list">${(c.reasons||['優位性なし']).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><div class="k">Risk Controls</div><ul class="list">${((c.warnings&&c.warnings.length)?c.warnings:['条件合致まで観測。']).map(x=>`<li>${x}</li>`).join('')}</ul></div></aside></div></div>`;requestAnimationFrame(()=>draw(document.getElementById('chart'),c))}
function card(s){return `<div class="card ${s.tone==='go'?'go':s.tone==='risk'?'risk':'wait'}"><div class="cap">${s.type}</div><div class="ttl">${s.title}</div><div class="cb">${s.body}</div></div>`}function newsCard(n){return `<div class="card ${n.priority==='HIGH'?'go':'wait'}"><div class="cap">${n.source} / ${n.priority}</div><div class="ttl">${n.title}</div><div class="cb">通常監視<br><a href="${n.url}" target="_blank">公式ページ</a></div></div>`}function marketCard(c){let chip=c.decision==='HIGH_CONVICTION'?'active':c.decision==='WATCH'?'watch':'still';return `<div class="mcard"><div class="mtop"><div><div class="mname">${c.name}</div><div class="meta">${c.symbol} / ${c.setup}</div></div><span class="chip ${chip}">${c.decision}</span></div><div class="mscore">${c.score}</div><div class="bodytxt">${c.action}</div><div class="rows"><div class="row"><span>Price</span><b>${fmtUsd(c.price)}</b></div><div class="row"><span>24H</span><b class="${cls(c.change24h)}">${fmtPct(c.change24h)}</b></div><div class="row"><span>6H</span><b class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</b></div><div class="row"><span>Vol</span><b>${Number(c.volumeSpike||0).toFixed(2)}x</b></div><div class="row"><span>Model</span><b>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}件</b></div></div></div>`}
function render(d){let c=d.primary,m=mode(c),p=d.portfolio||{};renderPerformance(d.enginePerformance||{});statusStrip.innerHTML=`<div class="stat"><div class="k">Feed</div><div class="v">${sourceLabel(d.source)}</div></div><div class="stat"><div class="k">Update</div><div class="v">${new Date(d.updatedAt).toLocaleString('ja-JP')}</div></div><div class="stat"><div class="k">Mode</div><div class="v">${m.label}<br>LINE: ${d.notification?.enabled?'ON':'未設定'}</div></div><div class="stat"><div class="k">Engine</div><div class="v">Observation only<br>Binance only</div></div>`;hero.innerHTML=`<div class="heroRow"><div><div class="cap">Alpha Intelligence</div><div class="command">${m.label}</div><div class="copy">${isQualified(c)?c.action:'条件合致なし。観測を継続します。'}</div></div><span class="chip ${m.chip}">${m.label}</span></div>`;renderPrimary(c);const cleanSignals=(d.signals||[]).filter(s=>!String(s.type||'').includes('ENGINE_PERFORMANCE')&&!String(s.title||'').includes('Engine Performance'));signals.innerHTML=cleanSignals.map(card).join('')||'<div class="empty">観測シグナルなし</div>';metrics.innerHTML=[['Total equity',fmtUsd(p.totalEquity)],['Cash',fmtUsd(p.cash)],['Closed P/L',fmtUsd(p.closedPnL),cls(p.closedPnL)],['Return',fmtPct(p.totalReturnPct),cls(p.totalReturnPct)],['Win rate',fmtPct(p.winRate)]].map(x=>`<div class="metric"><div class="k">${x[0]}</div><div class="mv ${x[2]||''}">${x[1]}</div></div>`).join('');news.innerHTML=(d.news||[]).map(newsCard).join('')||'<div class="empty">ニュースなし</div>';market.innerHTML=(d.market||[]).slice(0,10).map(marketCard).join('')||'<div class="empty">マーケットなし</div>'}
async function loadData(){renderPerformance({});try{let r=await fetch('/api/market?ts='+Date.now()),d=await r.json();if(!r.ok)throw new Error();render(d)}catch(e){statusStrip.innerHTML='<div class="empty">データ取得失敗</div>';primary.innerHTML='<div class="empty big"><div class="emptyTitle">監視モード：静止</div><div>データ取得待機中です。</div></div>'}}window.addEventListener('resize',()=>{if(lastPrimary){let c=document.getElementById('chart');if(c)draw(c,lastPrimary)}});loadData();setInterval(loadData,120000);
</script>
</body>
</html>
