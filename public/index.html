<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crypto Alpha Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#030407;--panel:#080b12;--panel2:#0b101b;--line:rgba(255,255,255,.08);--text:#eef3ff;--muted:#7b879f;--green:#66ffb5;--red:#ff7895;--blue:#7ab8ff;--yellow:#f2d27b;--violet:#9b8cff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% -10%,rgba(80,105,170,.16),transparent 34%),linear-gradient(180deg,#05060a,#020306);color:var(--text);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;-webkit-font-smoothing:antialiased}.shell{max-width:1440px;margin:0 auto;padding:16px}header{position:sticky;top:0;z-index:20;backdrop-filter:blur(18px);background:rgba(3,4,7,.86);border-bottom:1px solid var(--line);padding:16px;margin:-16px -16px 14px}.header-inner{max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;gap:14px;align-items:flex-start}h1{margin:0;font-size:30px;line-height:1;letter-spacing:-.06em}.sub{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.55}.btns{display:flex;gap:8px}.btn{border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.025));color:var(--text);border-radius:12px;padding:11px 14px;font:700 11px/1 "IBM Plex Mono";letter-spacing:.12em;text-transform:uppercase}.btn.danger{color:#ffb8c4;border-color:rgba(255,120,149,.22);background:rgba(255,120,149,.06)}.statusGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}.stat{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));border-radius:16px;padding:12px}.k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#68758e;margin-bottom:7px}.v{font-size:13px;line-height:1.45}.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}.hero{border:1px solid rgba(255,255,255,.09);background:radial-gradient(circle at 80% 0,rgba(102,255,181,.08),transparent 24%),linear-gradient(135deg,rgba(255,255,255,.035),rgba(255,255,255,.012));border-radius:22px;padding:16px;margin-bottom:12px}.heroRow{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#68758e}.command{font-size:30px;letter-spacing:-.06em;font-weight:700;margin:6px 0}.copy{color:#a5afc5;font-size:12px;line-height:1.7}.chip{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}.chip.still{color:#d7deec;background:rgba(255,255,255,.035)}.chip.watch{color:var(--yellow);background:rgba(242,210,123,.08);border-color:rgba(242,210,123,.22)}.chip.active{color:var(--green);background:rgba(102,255,181,.08);border-color:rgba(102,255,181,.22)}.section{margin-top:14px}.sectionHead{display:flex;justify-content:space-between;align-items:end;margin-bottom:9px}.sectionTitle{font-size:18px;font-weight:700;letter-spacing:-.04em}.sectionSub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#68758e}.cockpit{border:1px solid rgba(255,255,255,.09);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));overflow:hidden}.cockpitGrid{display:grid;grid-template-columns:minmax(0,1.55fr) 360px}.chartSide{padding:14px;border-right:1px solid rgba(255,255,255,.07)}.assetTop{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:10px}.asset{font-size:28px;font-weight:700;letter-spacing:-.06em}.meta{margin-top:6px;color:#78849d;font-size:12px}.mini{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.mini span{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:999px;padding:8px 10px;font-size:11px}.chartWrap{position:relative;border:1px solid rgba(255,255,255,.08);border-radius:20px;background:#05070c;overflow:hidden}.chart{display:block;width:100%;height:520px}.overlay{position:absolute;inset:0;pointer-events:none;padding:12px;display:flex;flex-direction:column;justify-content:space-between}.legend{display:flex;gap:8px;flex-wrap:wrap}.legend span{border:1px solid rgba(255,255,255,.08);background:rgba(4,6,10,.72);backdrop-filter:blur(8px);border-radius:10px;padding:7px 9px;font-size:10px;color:#cad3e5}.ovGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.ov{border:1px solid rgba(255,255,255,.08);background:rgba(4,6,10,.78);border-radius:12px;padding:9px;backdrop-filter:blur(10px)}.ov .kk{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#6d7a94}.ov .vv{font-size:15px;font-weight:700;margin-top:5px}.exec{padding:14px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.008))}.box{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);border-radius:16px;padding:13px}.score{font-size:50px;line-height:.9;letter-spacing:-.08em;font-weight:700}.planGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.plan{border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:10px;background:rgba(255,255,255,.025)}.plan .kk{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#68758e}.plan .vv{font-size:17px;font-weight:700;margin-top:5px}.plus{color:var(--green)}.minus{color:var(--red)}.blue{color:var(--blue)}.yellow{color:var(--yellow)}.bodytxt{font-size:12px;line-height:1.7;color:#c8d1e4}.list{margin:0;padding:0;list-style:none;display:grid;gap:7px}.list li{font-size:12px;line-height:1.55;color:#ccd5e8;display:flex;gap:8px}.list li:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:6px;flex:0 0 auto;box-shadow:0 0 12px rgba(122,184,255,.7)}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.012));border-radius:16px;padding:12px}.card.go{border-color:rgba(102,255,181,.18);background:rgba(102,255,181,.055)}.card.wait{border-color:rgba(242,210,123,.18);background:rgba(242,210,123,.045)}.card.risk{border-color:rgba(255,120,149,.18);background:rgba(255,120,149,.045)}.ct{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6f7c95;margin-bottom:7px}.ttl{font-size:16px;font-weight:700;margin-bottom:6px}.cb{font-size:12px;line-height:1.65;color:#bbc5d8}.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.metric{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:16px;padding:12px}.metric .mv{font-size:24px;font-weight:700;letter-spacing:-.05em}.market{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.mcard{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:18px;padding:13px}.mtop{display:flex;justify-content:space-between;gap:10px}.mname{font-size:20px;font-weight:700;letter-spacing:-.05em}.mscore{font-size:58px;font-weight:700;letter-spacing:-.08em;line-height:.9}.rows{display:grid;gap:7px;margin-top:10px}.row{display:grid;grid-template-columns:110px 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;font-size:12px}.empty{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:16px;padding:16px;color:#93a0b9;font-size:13px;line-height:1.7}a{color:#a8ceff}@media(max-width:1050px){.cockpitGrid{grid-template-columns:1fr}.chartSide{border-right:0;border-bottom:1px solid rgba(255,255,255,.07)}.statusGrid,.grid3,.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.market{grid-template-columns:1fr}}@media(max-width:640px){.header-inner{flex-direction:column}.btns{width:100%}.btn{flex:1}.statusGrid,.grid3,.metrics,.ovGrid{grid-template-columns:1fr}.heroRow{grid-template-columns:1fr}.assetTop{flex-direction:column}.mini{justify-content:flex-start}.chart{height:420px}.cockpit{border-radius:18px}}
</style>
</head>
<body>
<header><div class="header-inner"><div><h1>Crypto Alpha Terminal</h1><div class="sub">漆黒のコックピットで、Entry / Stop / Target / VWAP / EMA を一画面に凝縮する意思決定端末。</div></div><div class="btns"><button class="btn" onclick="loadData()">Rescan</button><button class="btn danger" onclick="loadData()">Reset</button></div></div></header>
<div class="shell">
  <div class="statusGrid" id="statusStrip"></div>
  <section class="hero" id="hero"></section>
  <section class="section"><div class="sectionHead"><div><div class="sectionSub">Primary Cockpit</div><div class="sectionTitle">本命セットアップ</div></div></div><div id="primary"></div></section>
  <section class="section"><div class="sectionHead"><div><div class="sectionSub">Signals</div><div class="sectionTitle">シグナルフィード</div></div></div><div class="grid3" id="signals"></div></section>
  <section class="section"><div class="sectionHead"><div><div class="sectionSub">Portfolio</div><div class="sectionTitle">概況</div></div></div><div class="metrics" id="metrics"></div></section>
  <section class="section"><div class="sectionHead"><div><div class="sectionSub">Binance Only</div><div class="sectionTitle">公式ニュース検知</div></div></div><div class="grid3" id="news"></div></section>
  <section class="section"><div class="sectionHead"><div><div class="sectionSub">Radar</div><div class="sectionTitle">全銘柄レーダー</div></div></div><div class="market" id="market"></div></section>
</div>
<script>
let lastPrimary=null;
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?5:2});
const fmtPct=n=>Number(n||0).toFixed(2)+'%';
const cls=n=>Number(n)>=0?'plus':'minus';
function sourceLabel(s){return s==='coinbase'?'<span class="ok">REAL: Coinbase</span>':s==='cache'?'<span class="warn">CACHE</span>':'<span class="bad">NO DATA</span>'}
function mode(c){if(!c||c.decision==='NO_TRADE')return{label:'監視モード：静止',chip:'still',copy:'優位性の高い執行候補は未検出。弾を温存し、次のフローを待ちます。'};if(c.decision==='WATCH')return{label:'監視モード：追尾',chip:'watch',copy:'候補は形成中。トリガー到達までは成行で触らず、出来高継続を確認します。'};return{label:'執行準備：武装',chip:'active',copy:'執行候補あり。Entry到達時に即判断できる状態です。'}}
function ema(values,period){const k=2/(period+1);let prev=null;return values.map(v=>{prev=prev===null?v:v*k+prev*(1-k);return prev})}
function vwap(data){let pv=0,vol=0;return data.map(c=>{const typical=(c.high+c.low+c.close)/3;pv+=typical*(c.volume||0);vol+=(c.volume||0);return vol?pv/vol:c.close})}
function draw(canvas,coin){const ctx=canvas.getContext('2d'),dpr=devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const W=rect.width,H=rect.height,data=coin.chart||[];ctx.clearRect(0,0,W,H);ctx.fillStyle='#05070c';ctx.fillRect(0,0,W,H);if(!data.length)return;const pad={l:18,r:74,t:18,b:70},volH=70,priceH=H-pad.t-pad.b-volH,plan=coin.plan||{};const ema20=ema(data.map(x=>x.close),20),ema50=ema(data.map(x=>x.close),50),vw=vwap(data);let lows=data.map(x=>x.low).concat([plan.stop,plan.entry,plan.target1,plan.target2,Math.min(...ema20),Math.min(...ema50),Math.min(...vw)]).filter(Boolean);let highs=data.map(x=>x.high).concat([plan.stop,plan.entry,plan.target1,plan.target2,Math.max(...ema20),Math.max(...ema50),Math.max(...vw)]).filter(Boolean);let min=Math.min(...lows),max=Math.max(...highs),rng=max-min||1;min-=rng*.06;max+=rng*.06;const x=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(data.length-1,1),y=p=>pad.t+(max-p)/(max-min)*priceH;ctx.strokeStyle='rgba(255,255,255,.055)';ctx.lineWidth=1;for(let i=0;i<6;i++){let yy=pad.t+i*priceH/5;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke()}const maxVol=Math.max(...data.map(c=>c.volume),1),cw=Math.max(3,Math.min(9,(W-pad.l-pad.r)/data.length*.62));data.forEach((c,i)=>{const xx=x(i),up=c.close>=c.open;ctx.strokeStyle=up?'rgba(102,255,181,.72)':'rgba(255,120,149,.72)';ctx.fillStyle=up?'rgba(102,255,181,.9)':'rgba(255,120,149,.9)';ctx.beginPath();ctx.moveTo(xx,y(c.high));ctx.lineTo(xx,y(c.low));ctx.stroke();const top=Math.min(y(c.open),y(c.close)),bh=Math.max(2,Math.abs(y(c.open)-y(c.close)));ctx.fillRect(xx-cw/2,top,cw,bh);let vh=c.volume/maxVol*volH;ctx.globalAlpha=.26;ctx.fillRect(xx-cw/2,H-pad.b-vh,cw,vh);ctx.globalAlpha=1});function line(series,color,label,dash=false){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.15;if(dash)ctx.setLineDash([5,5]);ctx.beginPath();series.forEach((v,i)=>{if(!v)return;const xx=x(i),yy=y(v);i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy)});ctx.stroke();ctx.restore();ctx.fillStyle=color;ctx.font='600 10px IBM Plex Mono';ctx.fillText(label,pad.l+8,y(series[series.length-1])-6)}line(ema20,'rgba(123,184,255,.82)','EMA20');line(ema50,'rgba(155,140,255,.74)','EMA50');line(vw,'rgba(242,210,123,.78)','VWAP',true);function level(val,label,color){if(!val)return;const yy=y(val);ctx.strokeStyle=color;ctx.setLineDash([4,5]);ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=color;ctx.font='700 10px IBM Plex Mono';ctx.fillText(label,W-pad.r+8,yy+3)}level(plan.entry,'ENTRY', 'rgba(102,255,181,.95)');level(plan.stop,'STOP','rgba(255,120,149,.95)');level(plan.target1,'TP1','rgba(123,184,255,.95)');level(plan.target2,'TP2','rgba(242,210,123,.95)');ctx.fillStyle='rgba(255,255,255,.05)';ctx.font='700 38px IBM Plex Mono';ctx.fillText(coin.symbol,pad.l+4,58);ctx.fillStyle='rgba(130,142,166,.85)';ctx.font='500 10px IBM Plex Mono';for(let i=0;i<6;i++){let p=max-(max-min)*i/5;ctx.fillText(fmtUsd(p),W-pad.r+8,pad.t+i*priceH/5+3)}}
function renderPrimary(c){if(!c){primary.innerHTML='<div class="empty">本命セットアップなし</div>';return}lastPrimary=c;const p=c.plan||{},m=mode(c);primary.innerHTML=`<div class="cockpit"><div class="cockpitGrid"><div class="chartSide"><div class="assetTop"><div><div class="eyebrow">Primary asset</div><div class="asset">${c.name}</div><div class="meta">${c.symbol} / Rank ${c.rank||'-'} / ${c.setup}</div></div><div class="mini"><span>Price ${fmtUsd(c.price)}</span><span class="${cls(c.change24h)}">24H ${fmtPct(c.change24h)}</span><span class="${cls(c.trend6h)}">6H ${fmtPct(c.trend6h)}</span><span>VOL ${Number(c.volumeSpike||0).toFixed(2)}x</span></div></div><div class="chartWrap"><canvas class="chart" id="chart"></canvas><div class="overlay"><div class="legend"><span>EMA20</span><span>EMA50</span><span>VWAP</span><span>${m.label}</span></div><div class="ovGrid"><div class="ov"><div class="kk">ENTRY</div><div class="vv plus">${fmtUsd(p.entry)}</div></div><div class="ov"><div class="kk">STOP</div><div class="vv minus">${fmtUsd(p.stop)}</div></div><div class="ov"><div class="kk">TP1</div><div class="vv blue">${fmtUsd(p.target1)}</div></div><div class="ov"><div class="kk">TP2</div><div class="vv yellow">${fmtUsd(p.target2)}</div></div><div class="ov"><div class="kk">R/R</div><div class="vv">${Number(p.rr||0).toFixed(2)}</div></div></div></div></div></div><aside class="exec"><div class="box"><div class="k">Execution state</div><div class="score">${c.score}</div><div class="planGrid"><div class="plan"><div class="kk">Entry</div><div class="vv plus">${fmtUsd(p.entry)}</div></div><div class="plan"><div class="kk">Stop</div><div class="vv minus">${fmtUsd(p.stop)}</div></div><div class="plan"><div class="kk">Target 1</div><div class="vv blue">${fmtUsd(p.target1)}</div></div><div class="plan"><div class="kk">Target 2</div><div class="vv yellow">${fmtUsd(p.target2)}</div></div></div></div><div class="box"><div class="k">Action brief</div><div class="bodytxt"><b>次の行動:</b><br>${c.action}<br><br><b>姿勢:</b><br>${m.copy}</div></div><div class="box"><div class="k">Positive factors</div><ul class="list">${(c.reasons||['優位性なし']).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><div class="k">Risk controls</div><ul class="list">${((c.warnings&&c.warnings.length)?c.warnings:['トリガー到達まで待機。']).map(x=>`<li>${x}</li>`).join('')}</ul></div></aside></div></div>`;requestAnimationFrame(()=>draw(document.getElementById('chart'),c))}
function card(s){return `<div class="card ${s.tone==='go'?'go':s.tone==='risk'?'risk':'wait'}"><div class="ct">${s.type}</div><div class="ttl">${s.title}</div><div class="cb">${s.body}</div></div>`}
function newsCard(n){return `<div class="card ${n.priority==='HIGH'?'go':'wait'}"><div class="ct">${n.source} / ${n.priority}</div><div class="ttl">${n.title}</div><div class="cb">${(n.keywords||[]).length?'検知: '+n.keywords.join(', '):'通常監視'}<br><a href="${n.url}" target="_blank">公式ページ</a></div></div>`}
function marketCard(c){let chip=c.decision==='BUY_WATCH'?'active':c.decision==='WATCH'?'watch':'still';return `<div class="mcard"><div class="mtop"><div><div class="mname">${c.name}</div><div class="meta">${c.symbol} / ${c.setup}</div></div><span class="chip ${chip}">${chip}</span></div><div class="mscore">${c.score}</div><div class="bodytxt">${c.action}</div><div class="rows"><div class="row"><span>Price</span><b>${fmtUsd(c.price)}</b></div><div class="row"><span>24H</span><b class="${cls(c.change24h)}">${fmtPct(c.change24h)}</b></div><div class="row"><span>6H</span><b class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</b></div><div class="row"><span>Vol spike</span><b>${Number(c.volumeSpike||0).toFixed(2)}x</b></div><div class="row"><span>BT</span><b>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}回</b></div></div></div>`}
function render(d){let c=d.primary,m=mode(c),p=d.portfolio||{};statusStrip.innerHTML=`<div class="stat"><div class="k">Market feed</div><div class="v">${sourceLabel(d.source)}</div></div><div class="stat"><div class="k">Update</div><div class="v">${new Date(d.updatedAt).toLocaleString('ja-JP')}</div></div><div class="stat"><div class="k">Mode</div><div class="v">${m.label}<br>LINE: ${d.notification?.enabled?'ON':'未設定'}</div></div><div class="stat"><div class="k">Engine</div><div class="v">Monitor only<br>Binance news only</div></div>`;hero.innerHTML=`<div class="heroRow"><div><div class="eyebrow">Alpha command</div><div class="command">${m.label}</div><div class="copy">${c?c.action:'優位性の高い執行候補は未検出。現金を守り、次の出来高急増を待機します。'}</div></div><span class="chip ${m.chip}">${m.label}</span></div>`;renderPrimary(c);signals.innerHTML=(d.signals||[]).map(card).join('')||'<div class="empty">シグナルなし</div>';metrics.innerHTML=[['Total equity',fmtUsd(p.totalEquity)],['Cash',fmtUsd(p.cash)],['Closed P/L',fmtUsd(p.closedPnL),cls(p.closedPnL)],['Return',fmtPct(p.totalReturnPct),cls(p.totalReturnPct)],['Win rate',fmtPct(p.winRate)]].map(x=>`<div class="metric"><div class="k">${x[0]}</div><div class="mv ${x[2]||''}">${x[1]}</div></div>`).join('');news.innerHTML=(d.news||[]).map(newsCard).join('')||'<div class="empty">ニュースなし</div>';market.innerHTML=(d.market||[]).slice(0,10).map(marketCard).join('')||'<div class="empty">マーケットなし</div>'}
async function loadData(){try{let r=await fetch('/api/market?ts='+Date.now()),d=await r.json();if(!r.ok)throw new Error();render(d)}catch(e){statusStrip.innerHTML='<div class="empty">データ取得失敗</div>';primary.innerHTML='<div class="empty">本命セットアップなし</div>'}}
window.addEventListener('resize',()=>{if(lastPrimary){let c=document.getElementById('chart');if(c)draw(c,lastPrimary)}});loadData();setInterval(loadData,120000);
</script>
</body>
</html>
