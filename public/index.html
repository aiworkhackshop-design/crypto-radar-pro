<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crypto War Room</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 50% -10%,#173526 0,#080b12 36%,#040506 100%);color:#f7f9ff}header{position:sticky;top:0;z-index:20;backdrop-filter:blur(20px);background:rgba(4,5,8,.9);border-bottom:1px solid rgba(255,255,255,.08);padding:18px 16px}.wrap,main{max-width:1180px;margin:0 auto}h1{margin:0;font-size:28px;letter-spacing:-.05em}.sub{color:#aeb7c8;font-size:13px;line-height:1.5;margin-top:6px}main{padding:16px}.bar{display:grid;grid-template-columns:1fr;gap:10px}.status,.panel,.metric,.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:20px}.status{padding:12px 14px;color:#cbd3e3;font-size:13px;line-height:1.55}button{border:0;border-radius:15px;padding:13px 14px;font-weight:950;font-size:15px;background:#f5f7fb;color:#07080d}.dangerBtn{background:#421217;color:#ffb6b6;border:1px solid rgba(255,80,80,.35)}.hero{margin-top:14px;padding:18px;background:linear-gradient(135deg,rgba(67,255,151,.14),rgba(255,255,255,.04) 45%,rgba(255,179,64,.09));border:1px solid rgba(141,255,189,.18);border-radius:24px;box-shadow:0 24px 90px rgba(0,0,0,.3)}.heroTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.kicker{color:#8dffbd;font-size:12px;font-weight:950;letter-spacing:.08em}.mission{font-size:24px;font-weight:1000;line-height:1.2;letter-spacing:-.04em;margin:6px 0}.missionText{color:#dce4f4;font-size:13px;line-height:1.65}.alertPill{display:inline-flex;align-items:center;border-radius:999px;padding:8px 11px;font-weight:950;font-size:12px}.GO{background:rgba(68,255,151,.16);color:#8dffbd;border:1px solid rgba(68,255,151,.3)}.WAIT{background:rgba(255,214,90,.16);color:#ffe089;border:1px solid rgba(255,214,90,.3)}.RISK{background:rgba(255,82,82,.16);color:#ffaaaa;border:1px solid rgba(255,82,82,.3)}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:14px 0}.metric{padding:14px}.metric .label{color:#aab1c3;font-size:12px}.metric .value{font-size:22px;font-weight:1000;margin-top:5px;letter-spacing:-.03em}.section-title{margin:26px 0 10px;font-size:19px;letter-spacing:-.03em}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{padding:16px;box-shadow:0 18px 70px rgba(0,0,0,.25)}.prime{border-color:rgba(141,255,189,.32);background:linear-gradient(180deg,rgba(68,255,151,.08),rgba(255,255,255,.045))}.hot{border-color:rgba(255,214,90,.35);background:linear-gradient(180deg,rgba(255,214,90,.08),rgba(255,255,255,.045))}.coinTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.coinName{font-size:22px;font-weight:1000;letter-spacing:-.04em}.coinSub{color:#aab1c3;font-size:12px;margin-top:3px}.score{font-size:54px;font-weight:1000;letter-spacing:-.08em;line-height:1;margin:13px 0}.badge{display:inline-flex;border-radius:999px;padding:8px 11px;font-weight:1000;font-size:12px}.BUY_WATCH{background:rgba(68,255,151,.15);color:#8dffbd;border:1px solid rgba(68,255,151,.3)}.WATCH{background:rgba(255,214,90,.14);color:#ffe089;border:1px solid rgba(255,214,90,.28)}.AVOID,.DANGER{background:rgba(255,82,82,.14);color:#ffaaaa;border:1px solid rgba(255,82,82,.28)}.plan{margin-top:12px;padding:12px;border-radius:14px;background:rgba(255,255,255,.06);font-size:14px;line-height:1.6;color:#e9eefb}.reasons{margin:12px 0 0;padding-left:19px;font-size:13px;line-height:1.65;color:#edf2ff}.warn{margin-top:10px;color:#ffe089;font-size:13px;line-height:1.55}.rows{margin-top:12px}.row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid rgba(255,255,255,.08);font-size:13px}.row span:first-child{color:#aab1c3}.plus{color:#7dff9f}.minus{color:#ff8585}.source-ok{color:#8dffbd;font-weight:950}.source-warn{color:#ffe089;font-weight:950}.source-bad{color:#ffaaaa;font-weight:950}.table{overflow:auto;border:1px solid rgba(255,255,255,.1);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:760px;background:rgba(255,255,255,.045)}th,td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px}th{color:#aab1c3;font-weight:900}.empty{color:#aab1c3;padding:18px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.04);line-height:1.6}a{color:#9ecbff}.notice{margin:18px 0;color:#aab1c3;font-size:12px;line-height:1.6}@media(min-width:780px){.bar{grid-template-columns:1fr 180px 180px}.metrics{grid-template-columns:repeat(5,minmax(0,1fr))}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.mission{font-size:34px}}
  </style>
</head>
<body>
<header><div class="wrap"><h1>Crypto War Room</h1><div class="sub">ただの価格表ではなく、今の相場で「攻める / 待つ / 触らない」を決めるための司令室。</div></div></header>
<main>
  <div class="bar"><div class="status" id="status">起動中です。市場をスキャンします。</div><button onclick="loadData()">再スキャン</button><button class="dangerBtn" onclick="resetTrading()">リセット</button></div>
  <section class="hero" id="hero"></section>
  <div class="metrics" id="metrics"></div>
  <h2 class="section-title">今の監視優先 TOP5</h2><div class="grid" id="topCards"></div>
  <h2 class="section-title">保有中ポジション</h2><div class="table"><table id="positions"></table></div>
  <h2 class="section-title">全銘柄レーダー</h2><div class="grid" id="cards"></div>
  <h2 class="section-title">取引ログ</h2><div class="table"><table id="trades"></table></div>
  <h2 class="section-title">公式ニュースリンク</h2><div class="panel card" id="news">読み込み中...</div>
  <div class="notice">注意: 実売買・投資助言ではありません。ペーパートレードと検証用の判断補助です。</div>
</main>
<script>
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?6:2});
const fmtPct=n=>Number(n||0).toFixed(2)+'%';
const fmtBig=n=>{n=Number(n||0);if(n<=0)return'N/A';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString('en-US')};
const cls=n=>Number(n)>=0?'plus':'minus';
function sourceLabel(d){if(d.source==='coinbase')return'<span class="source-ok">REAL: Coinbase</span>';if(d.source==='cache')return'<span class="source-warn">CACHE</span>';return'<span class="source-bad">NO DATA</span>'}
function marketMode(market){const arr=market||[];if(!arr.length)return{mode:'NO DATA',cls:'RISK',text:'市場データが取れていません。触らない。'};const go=arr.filter(x=>x.decision==='BUY_WATCH').length;const watch=arr.filter(x=>x.decision==='WATCH').length;const avg6=arr.reduce((s,x)=>s+(x.trend6h||0),0)/arr.length;const avgVol=arr.reduce((s,x)=>s+(x.volumeSpike||0),0)/arr.length;if(go>=2)return{mode:'GO ZONE',cls:'GO',text:`BUY_WATCHが${go}件。チャンスはあるが、飛び乗りではなく条件確認。`};if(watch>=3||avg6>0.4)return{mode:'WATCH MODE',cls:'WAIT',text:`監視優先。短期トレンド平均 ${fmtPct(avg6)} / 出来高倍率平均 ${avgVol.toFixed(2)}x。`};return{mode:'DEFENSE',cls:'RISK',text:'今は攻め場が薄い。無理に買わず、次の出来高急増を待つ。'}}
async function loadData(){const s=document.getElementById('status');s.textContent='市場スキャン中...';try{const r=await fetch('/api/market?ts='+Date.now());const d=await r.json();if(!r.ok)throw new Error(d.message||'取得失敗');render(d)}catch(e){s.innerHTML='<span class="source-bad">取得失敗</span><br>'+e.message;renderEmpty()}}
function renderEmpty(){document.getElementById('hero').innerHTML='<div class="kicker">NO DATA</div><div class="mission">今は何もしない</div><div class="missionText">リアルデータが取得できていません。デモ表示はしません。</div>';document.getElementById('metrics').innerHTML='';document.getElementById('positions').innerHTML='<tr><td>データなし</td></tr>';document.getElementById('topCards').innerHTML='<div class="empty">リアルデータなし</div>';document.getElementById('cards').innerHTML='<div class="empty">リアルデータなし</div>';document.getElementById('trades').innerHTML='<tr><td>データなし</td></tr>'}
function coinCard(c,top=false){const warn=(c.warnings||[]).length?`<div class="warn">⚠ ${c.warnings.join('<br>⚠ ')}</div>`:'';const cardClass=top?'card prime':'card';return `<div class="${cardClass}"><div class="coinTop"><div><div class="coinName">${c.name}</div><div class="coinSub">${c.symbol} / Rank ${c.rank||'-'}</div></div><div class="badge ${c.decision||c.className}">${c.decision||c.className}</div></div><div class="score">${c.score}</div><div class="plan"><b>作戦:</b> ${c.action||'条件不足。待機。'}</div><ul class="reasons">${(c.reasons||['買い根拠が不足']).map(x=>`<li>${x}</li>`).join('')}</ul>${warn}<div class="rows"><div class="row"><span>価格</span><strong>${fmtUsd(c.price)}</strong></div><div class="row"><span>24h</span><strong class="${cls(c.change24h)}">${fmtPct(c.change24h)}</strong></div><div class="row"><span>6hトレンド</span><strong class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</strong></div><div class="row"><span>出来高倍率</span><strong>${Number(c.volumeSpike||0).toFixed(2)}x</strong></div><div class="row"><span>簡易BT勝率</span><strong>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}回</strong></div><div class="row"><span>期待値</span><strong class="${cls(c.backtest?.expectancy||0)}">${fmtPct(c.backtest?.expectancy||0)}</strong></div><div class="row"><span>出来高</span><strong>${fmtBig(c.volume)}</strong></div></div></div>`}
function render(d){const p=d.portfolio;const warn=d.warning?`<br><span class="source-warn">${d.warning}</span>`:'';const mode=marketMode(d.market);const best=(d.top||[])[0];document.getElementById('status').innerHTML=`最終更新: ${new Date(d.updatedAt).toLocaleString('ja-JP')}<br>データソース: ${sourceLabel(d)}${warn}<br>ペーパートレード: ${d.trading.paperTradingEnabled?'ON':'OFF'} ${d.trading.pausedReason?' / '+d.trading.pausedReason:''}`;document.getElementById('hero').innerHTML=`<div class="heroTop"><div><div class="kicker">MARKET COMMAND</div><div class="mission">${mode.mode}</div><div class="missionText">${mode.text}${best?`<br>最優先監視: <b>${best.name}</b> / Score ${best.score} / ${best.decision}`:''}</div></div><div class="alertPill ${mode.cls}">${mode.mode}</div></div>`;document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">総資産</div><div class="value">${fmtUsd(p.totalEquity)}</div></div><div class="metric"><div class="label">現金</div><div class="value">${fmtUsd(p.cash)}</div></div><div class="metric"><div class="label">確定損益</div><div class="value ${cls(p.closedPnL)}">${fmtUsd(p.closedPnL)}</div></div><div class="metric"><div class="label">総リターン</div><div class="value ${cls(p.totalReturnPct)}">${fmtPct(p.totalReturnPct)}</div></div><div class="metric"><div class="label">勝率</div><div class="value">${fmtPct(p.winRate)}</div></div>`;document.getElementById('topCards').innerHTML=(d.top||[]).length?(d.top||[]).map(c=>coinCard(c,true)).join(''):'<div class="empty">TOP候補なし</div>';document.getElementById('positions').innerHTML=`<tr><th>銘柄</th><th>Entry</th><th>Now</th><th>Value</th><th>PnL</th><th>Opened</th></tr>${p.positions.length?p.positions.map(pos=>`<tr><td>${pos.symbol} / ${pos.name}</td><td>${fmtUsd(pos.entryPrice)}</td><td>${fmtUsd(pos.currentPrice)}</td><td>${fmtUsd(pos.value)}</td><td class="${cls(pos.pnlUsd)}">${fmtUsd(pos.pnlUsd)} / ${fmtPct(pos.pnlPct)}</td><td>${new Date(pos.openedAt).toLocaleString('ja-JP')}</td></tr>`).join(''):'<tr><td colspan="6">現在ポジションなし</td></tr>'}`;document.getElementById('cards').innerHTML=(d.market||[]).length?(d.market||[]).map(c=>coinCard(c,false)).join(''):'<div class="empty">リアルデータなし</div>';document.getElementById('trades').innerHTML=`<tr><th>Time</th><th>Type</th><th>Symbol</th><th>Price</th><th>Amount</th><th>PnL</th><th>Reason</th></tr>${d.trades.length?d.trades.slice(0,30).map(t=>`<tr><td>${new Date(t.time).toLocaleString('ja-JP')}</td><td>${t.type}</td><td>${t.symbol}</td><td>${fmtUsd(t.price)}</td><td>${fmtUsd(t.amountUsd)}</td><td class="${cls(t.pnlUsd)}">${fmtUsd(t.pnlUsd)} / ${fmtPct(t.pnlPct)}</td><td>${t.reason}</td></tr>`).join(''):'<tr><td colspan="7">まだ取引ログなし</td></tr>'}`}
async function resetTrading(){if(!confirm('ペーパートレードを初期化しますか？'))return;await fetch('/api/trading/reset',{method:'POST'});loadData()}
async function loadNews(){const r=await fetch('/api/news');const d=await r.json();document.getElementById('news').innerHTML=d.sources.map(s=>`<p><a href="${s.url}" target="_blank">${s.name}</a></p>`).join('')+`<p>${d.note}</p>`}
loadData();loadNews();setInterval(loadData,120000);
</script>
</body>
</html>
