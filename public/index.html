<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crypto Alpha Terminal</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 50% -10%,#253251 0,#06080d 40%,#030405 100%);color:#f7f9ff}header{position:sticky;top:0;z-index:20;backdrop-filter:blur(20px);background:rgba(3,4,6,.92);border-bottom:1px solid rgba(255,255,255,.08);padding:18px 16px}.wrap,main{max-width:1180px;margin:0 auto}h1{margin:0;font-size:30px;letter-spacing:-.06em}.sub{color:#aeb7c8;font-size:13px;line-height:1.5;margin-top:6px}main{padding:16px}.bar{display:grid;grid-template-columns:1fr;gap:10px}.status,.panel,.metric,.card,.signal,.alert,.news,.terminal{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:20px}.status{padding:12px 14px;color:#cbd3e3;font-size:13px;line-height:1.55}button{border:0;border-radius:15px;padding:13px 14px;font-weight:950;font-size:15px;background:#f5f7fb;color:#07080d}.dangerBtn{background:#421217;color:#ffb6b6;border:1px solid rgba(255,80,80,.35)}.hero{margin-top:14px;padding:18px;background:linear-gradient(135deg,rgba(123,92,255,.2),rgba(255,255,255,.04) 42%,rgba(67,255,151,.12));border:1px solid rgba(160,145,255,.24);border-radius:24px;box-shadow:0 24px 90px rgba(0,0,0,.3)}.heroTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.kicker{color:#9ecbff;font-size:12px;font-weight:950;letter-spacing:.08em}.mission{font-size:28px;font-weight:1000;line-height:1.12;letter-spacing:-.06em;margin:6px 0}.missionText{color:#dce4f4;font-size:13px;line-height:1.65}.alertPill{display:inline-flex;align-items:center;border-radius:999px;padding:8px 11px;font-weight:950;font-size:12px}.go{background:rgba(68,255,151,.16);color:#8dffbd;border:1px solid rgba(68,255,151,.3)}.wait{background:rgba(255,214,90,.16);color:#ffe089;border:1px solid rgba(255,214,90,.3)}.risk{background:rgba(255,82,82,.16);color:#ffaaaa;border:1px solid rgba(255,82,82,.3)}.section-title{margin:26px 0 10px;font-size:19px;letter-spacing:-.03em}.terminal{padding:16px;background:linear-gradient(180deg,rgba(18,25,38,.95),rgba(10,12,18,.95));border-color:rgba(141,255,189,.18)}.setupHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.coinName{font-size:24px;font-weight:1000;letter-spacing:-.05em}.coinSub{color:#aab1c3;font-size:12px;margin-top:3px}.score{font-size:60px;font-weight:1000;letter-spacing:-.08em;line-height:1;margin:12px 0}.badge{display:inline-flex;border-radius:999px;padding:8px 11px;font-weight:1000;font-size:12px}.BUY_WATCH{background:rgba(68,255,151,.15);color:#8dffbd;border:1px solid rgba(68,255,151,.3)}.WATCH{background:rgba(255,214,90,.14);color:#ffe089;border:1px solid rgba(255,214,90,.28)}.NO_TRADE,.AVOID{background:rgba(255,82,82,.14);color:#ffaaaa;border:1px solid rgba(255,82,82,.28)}.chartBox{margin-top:14px;border-radius:18px;border:1px solid rgba(255,255,255,.1);background:#070a10;overflow:hidden}.chart{width:100%;height:300px;display:block}.planGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.planItem{padding:12px;border-radius:15px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08)}.planItem .label{color:#aab1c3;font-size:11px;font-weight:900;letter-spacing:.08em}.planItem .value{font-size:20px;font-weight:1000;margin-top:4px}.planText{margin-top:12px;padding:12px;border-radius:15px;background:rgba(255,255,255,.06);line-height:1.6;color:#e9eefb;font-size:14px}.reasons{margin:12px 0 0;padding-left:19px;font-size:13px;line-height:1.65;color:#edf2ff}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:14px 0}.metric{padding:14px}.metric .label{color:#aab1c3;font-size:12px}.metric .value{font-size:22px;font-weight:1000;margin-top:5px;letter-spacing:-.03em}.signals,.alerts,.newsGrid,.grid{display:grid;grid-template-columns:1fr;gap:10px}.signal,.alert,.news,.card{padding:13px}.signal .type,.alert .type,.news .type{font-size:11px;font-weight:1000;letter-spacing:.08em;color:#aab1c3}.signal .title,.alert .title,.news .title{font-size:18px;font-weight:1000;margin-top:4px}.signal .body,.alert .body,.news .body{font-size:13px;color:#dfe5f3;line-height:1.55;margin-top:6px}.setup{display:inline-flex;margin-top:8px;color:#9ecbff;font-size:12px;font-weight:900}.row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid rgba(255,255,255,.08);font-size:13px}.row span:first-child{color:#aab1c3}.plus{color:#7dff9f}.minus{color:#ff8585}.source-ok{color:#8dffbd;font-weight:950}.source-warn{color:#ffe089;font-weight:950}.source-bad{color:#ffaaaa;font-weight:950}.table{overflow:auto;border:1px solid rgba(255,255,255,.1);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:760px;background:rgba(255,255,255,.045)}th,td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px}th{color:#aab1c3;font-weight:900}.empty{color:#aab1c3;padding:18px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.04);line-height:1.6}a{color:#9ecbff}.notice{margin:18px 0;color:#aab1c3;font-size:12px;line-height:1.6}@media(min-width:780px){.bar{grid-template-columns:1fr 180px 180px}.metrics{grid-template-columns:repeat(5,minmax(0,1fr))}.signals,.alerts,.newsGrid,.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.planGrid{grid-template-columns:repeat(5,minmax(0,1fr))}.mission{font-size:38px}.chart{height:420px}}
  </style>
</head>
<body>
<header><div class="wrap"><h1>Crypto Alpha Terminal</h1><div class="sub">本命セットアップ・チャート・Entry / Stop / Target を一画面で決める意思決定端末。</div></div></header>
<main>
  <div class="bar"><div class="status" id="status">起動中です。市場をスキャンします。</div><button onclick="loadData()">再スキャン</button><button class="dangerBtn" onclick="resetTrading()">リセット</button></div>
  <section class="hero" id="hero"></section>
  <h2 class="section-title">本命セットアップ</h2><section class="terminal" id="primarySetup"></section>
  <h2 class="section-title">シグナルフィード</h2><div class="signals" id="signals"></div>
  <h2 class="section-title">アラート履歴</h2><div class="alerts" id="alerts"></div>
  <div class="metrics" id="metrics"></div>
  <h2 class="section-title">次点セットアップ</h2><div class="grid" id="topCards"></div>
  <h2 class="section-title">公式ニュース検知</h2><div class="newsGrid" id="newsItems"></div>
  <h2 class="section-title">全銘柄レーダー</h2><div class="grid" id="cards"></div>
  <div class="notice">注意: 実売買・投資助言ではありません。LINE通知はRender環境変数 LINE_CHANNEL_ACCESS_TOKEN / LINE_TO 設定後に有効化されます。</div>
</main>
<script>
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:Math.abs(n)<1?6:2});
const fmtPct=n=>Number(n||0).toFixed(2)+'%';
const fmtBig=n=>{n=Number(n||0);if(n<=0)return'N/A';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString('en-US')};
const cls=n=>Number(n)>=0?'plus':'minus';
function sourceLabel(d){if(d.source==='coinbase')return'<span class="source-ok">REAL: Coinbase</span>';if(d.source==='cache')return'<span class="source-warn">CACHE</span>';return'<span class="source-bad">NO DATA</span>'}
async function loadData(){const s=document.getElementById('status');s.textContent='市場スキャン中...';try{const r=await fetch('/api/market?ts='+Date.now());const d=await r.json();if(!r.ok)throw new Error(d.message||'取得失敗');render(d)}catch(e){s.innerHTML='<span class="source-bad">取得失敗</span><br>'+e.message;renderEmpty()}}
function renderEmpty(){document.getElementById('hero').innerHTML='<div class="kicker">NO DATA</div><div class="mission">今は何もしない</div><div class="missionText">リアルデータが取得できていません。</div>';document.getElementById('primarySetup').innerHTML='<div class="empty">本命なし</div>';document.getElementById('signals').innerHTML='<div class="empty">シグナルなし</div>';document.getElementById('alerts').innerHTML='<div class="empty">アラートなし</div>';document.getElementById('newsItems').innerHTML='<div class="empty">ニュースなし</div>';document.getElementById('metrics').innerHTML='';document.getElementById('topCards').innerHTML='<div class="empty">リアルデータなし</div>';document.getElementById('cards').innerHTML='<div class="empty">リアルデータなし</div>'}
function signalCard(s){return `<div class="signal ${s.tone||'wait'}"><div class="type">${s.type}</div><div class="title">${s.title}</div><div class="body">${s.body}</div></div>`}
function alertCard(a){return `<div class="alert ${a.tone||'wait'}"><div class="type">${a.type} ${a.notified?'・LINE済':'・LINE未送信'}</div><div class="title">${a.title}</div><div class="body">${a.body}<br>${new Date(a.createdAt).toLocaleString('ja-JP')}</div></div>`}
function newsCard(n){return `<div class="news ${n.priority==='HIGH'?'go':n.priority==='ERROR'?'risk':'wait'}"><div class="type">${n.source} / ${n.priority}</div><div class="title">${n.title}</div><div class="body">${(n.keywords||[]).length?'検知: '+n.keywords.join(', '):'通常監視'}<br><a href="${n.url}" target="_blank">公式ページ</a></div></div>`}
function drawChart(canvas, coin){const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.scale(dpr,dpr);const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#070a10';ctx.fillRect(0,0,W,H);const data=coin.chart||[];if(!data.length)return;const pad={l:54,r:62,t:18,b:74};const chartH=H-pad.t-pad.b;const volH=52;const priceH=chartH-volH-18;const lows=data.map(x=>x.low).concat([coin.plan.stop,coin.plan.target2]);const highs=data.map(x=>x.high).concat([coin.plan.entry,coin.plan.target2]);const min=Math.min(...lows),max=Math.max(...highs);const y=p=>pad.t+(max-p)/(max-min)*priceH;const x=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(data.length-1,1);ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;for(let i=0;i<5;i++){const yy=pad.t+i*priceH/4;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke()}const maxVol=Math.max(...data.map(c=>c.volume),1);const cw=Math.max(3,(W-pad.l-pad.r)/data.length*.62);data.forEach((c,i)=>{const xx=x(i);const up=c.close>=c.open;ctx.strokeStyle=up?'#7dff9f':'#ff8585';ctx.fillStyle=up?'#7dff9f':'#ff8585';ctx.beginPath();ctx.moveTo(xx,y(c.high));ctx.lineTo(xx,y(c.low));ctx.stroke();const bodyY=Math.min(y(c.open),y(c.close));const bodyH=Math.max(2,Math.abs(y(c.open)-y(c.close)));ctx.fillRect(xx-cw/2,bodyY,cw,bodyH);const vh=c.volume/maxVol*volH;ctx.globalAlpha=.35;ctx.fillRect(xx-cw/2,H-pad.b+volH-vh,cw,vh);ctx.globalAlpha=1});function level(val,label,color){const yy=y(val);ctx.strokeStyle=color;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=color;ctx.font='700 11px -apple-system,BlinkMacSystemFont,Segoe UI';ctx.fillText(label,W-pad.r+6,yy+4)}level(coin.plan.entry,'ENTRY', '#8dffbd');level(coin.plan.stop,'STOP', '#ff8585');level(coin.plan.target1,'TP1', '#9ecbff');level(coin.plan.target2,'TP2', '#ffe089');ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='700 11px -apple-system,BlinkMacSystemFont,Segoe UI';ctx.fillText(`${coin.symbol} 48H / 1H candles`,pad.l,pad.t+12)}
function primarySetup(c){if(!c)return '<div class="empty">本命セットアップなし</div>';const p=c.plan||{};setTimeout(()=>{const canvas=document.getElementById('mainChart');if(canvas)drawChart(canvas,c)},0);return `<div class="setupHead"><div><div class="kicker">PRIMARY SETUP</div><div class="coinName">${c.name}</div><div class="coinSub">${c.symbol} / Rank ${c.rank||'-'} / ${c.setup}</div></div><div class="badge ${c.decision}">${c.decision}</div></div><div class="score">${c.score}</div><div class="chartBox"><canvas class="chart" id="mainChart"></canvas></div><div class="planGrid"><div class="planItem"><div class="label">ENTRY</div><div class="value plus">${fmtUsd(p.entry)}</div></div><div class="planItem"><div class="label">STOP</div><div class="value minus">${fmtUsd(p.stop)}</div></div><div class="planItem"><div class="label">TARGET 1</div><div class="value">${fmtUsd(p.target1)}</div></div><div class="planItem"><div class="label">TARGET 2</div><div class="value">${fmtUsd(p.target2)}</div></div><div class="planItem"><div class="label">R/R</div><div class="value">${Number(p.rr||0).toFixed(2)}</div></div></div><div class="planText"><b>次の行動:</b> ${c.action}<br><b>無効条件:</b> ${fmtUsd(p.invalid)} 割れ。</div><ul class="reasons">${(c.reasons||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`}
function coinCard(c){return `<div class="card"><div class="setupHead"><div><div class="coinName">${c.name}</div><div class="coinSub">${c.symbol} / Rank ${c.rank||'-'}</div><div class="setup">${c.setup}</div></div><div class="badge ${c.decision}">${c.decision}</div></div><div class="score">${c.score}</div><div class="planText"><b>次の行動:</b> ${c.action}</div><div class="row"><span>価格</span><strong>${fmtUsd(c.price)}</strong></div><div class="row"><span>24h</span><strong class="${cls(c.change24h)}">${fmtPct(c.change24h)}</strong></div><div class="row"><span>6h</span><strong class="${cls(c.trend6h)}">${fmtPct(c.trend6h)}</strong></div><div class="row"><span>出来高倍率</span><strong>${Number(c.volumeSpike||0).toFixed(2)}x</strong></div><div class="row"><span>BT勝率</span><strong>${fmtPct(c.backtest?.winRate||0)} / ${c.backtest?.trades||0}回</strong></div><div class="row"><span>期待値</span><strong class="${cls(c.backtest?.expectancy||0)}">${fmtPct(c.backtest?.expectancy||0)}</strong></div></div>`}
function render(d){const p=d.portfolio;const warn=d.warning?`<br><span class="source-warn">${d.warning}</span>`:'';const cmd=d.command||{label:'NO DATA',tone:'risk',action:'データなし'};document.getElementById('status').innerHTML=`最終更新: ${new Date(d.updatedAt).toLocaleString('ja-JP')}<br>データソース: ${sourceLabel(d)}${warn}<br>監視モード: ON / LINE通知: ${d.notification?.enabled?'ON':'未設定'}`;document.getElementById('hero').innerHTML=`<div class="heroTop"><div><div class="kicker">ALPHA COMMAND</div><div class="mission">${cmd.label}</div><div class="missionText">${cmd.action}</div></div><div class="alertPill ${cmd.tone}">${cmd.label}</div></div>`;document.getElementById('primarySetup').innerHTML=primarySetup(d.primary);document.getElementById('signals').innerHTML=(d.signals||[]).map(signalCard).join('')||'<div class="empty">シグナルなし</div>';document.getElementById('alerts').innerHTML=(d.alerts||[]).slice(0,6).map(alertCard).join('')||'<div class="empty">アラートなし</div>';document.getElementById('newsItems').innerHTML=(d.news||[]).map(newsCard).join('')||'<div class="empty">ニュースなし</div>';document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">総資産</div><div class="value">${fmtUsd(p.totalEquity)}</div></div><div class="metric"><div class="label">現金</div><div class="value">${fmtUsd(p.cash)}</div></div><div class="metric"><div class="label">確定損益</div><div class="value ${cls(p.closedPnL)}">${fmtUsd(p.closedPnL)}</div></div><div class="metric"><div class="label">総リターン</div><div class="value ${cls(p.totalReturnPct)}">${fmtPct(p.totalReturnPct)}</div></div><div class="metric"><div class="label">勝率</div><div class="value">${fmtPct(p.winRate)}</div></div>`;document.getElementById('topCards').innerHTML=(d.top||[]).filter(x=>!d.primary||x.symbol!==d.primary.symbol).slice(0,3).map(coinCard).join('')||'<div class="empty">次点なし</div>';document.getElementById('cards').innerHTML=(d.market||[]).slice(0,12).map(coinCard).join('')||'<div class="empty">リアルデータなし</div>'}
async function resetTrading(){loadData()}
window.addEventListener('resize',()=>{if(window.__lastPrimary){const c=document.getElementById('mainChart');if(c)drawChart(c,window.__lastPrimary)}});
const oldPrimary=primarySetup;primarySetup=function(c){window.__lastPrimary=c;return oldPrimary(c)};
loadData();setInterval(loadData,120000);
</script>
</body>
</html>
